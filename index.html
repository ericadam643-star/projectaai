// REVISION HISTORY VIEWER
// ═══════════════════════════════════════════════════════════════
function RevisionHistory({ project, chapterNum, currentDrafts }) {
  const [history, setHistory]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [viewVersion, setViewVersion] = useState(null);
  const [compareMode, setCompareMode] = useState(false);
  const [compareV, setCompareV]   = useState(null);

  useEffect(function() {
    const load = async () => {
      if (!project || !project.supervisorCodeKey || !project.studentName) { setLoading(false); return; }
      try {
        // Check SUP_CACHE first (same-session, fastest)
        const cachedProf = SUP_CACHE[project.supervisorCodeKey];
        if (cachedProf && cachedProf.revHistory && cachedProf.revHistory[project.studentName] && cachedProf.revHistory[project.studentName][chapterNum]) {
          setHistory(cachedProf.revHistory[project.studentName][chapterNum]);
          setLoading(false);
          return;
        }
        // Fall back to shared storage (cross-device)
        const sKey = project.studentName.trim().toLowerCase().replace(/\s+/g,"_").slice(0,12);
        const supCode = (project.supervisorCodeKey || "").replace("sup_code_","").replace(/[^a-z0-9]/gi,"");
        const histKey = "hist_" + supCode + "_" + sKey + "_ch" + chapterNum;
        const res = await safeGet(histKey);
        if (res && res.value) {
          const hist = JSON.parse(res.value);
          setHistory(hist);
          // Cache it for future same-session use
          if (cachedProf) {
            if (!cachedProf.revHistory) cachedProf.revHistory = {};
            if (!cachedProf.revHistory[project.studentName]) cachedProf.revHistory[project.studentName] = {};
            cachedProf.revHistory[project.studentName][chapterNum] = hist;
          }
        }
      } catch(e) {}
      setLoading(false);
    };
    load();
  }, [project, chapterNum]);

  const chObj = CHAPTERS.find(function(c){ return c.num === chapterNum; });

  if (loading) return <div style={{ fontSize:12, color:"var(--grey3)", padding:"10px 0" }}>Loading history...</div>;
  if (history.length === 0) return null;

  return (
    <div style={{ marginTop:20 }}>
      <div style={{ fontSize:10, fontWeight:700, color:"var(--teal)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:10 }}>
        📋 Revision History — {history.length} submission{history.length > 1 ? "s" : ""}
      </div>

      {/* Version selector */}
      <div style={{ display:"flex", gap:7, flexWrap:"wrap", marginBottom:14 }}>
        {history.map(function(h, i) {
          const isActive = viewVersion === i;
          return (
            <button key={i} onClick={() => { setViewVersion(isActive ? null : i); setCompareMode(false); setCompareV(null); }}
              style={{ background: isActive ? "rgba(0,201,167,0.15)" : "rgba(255,255,255,0.05)", border:"1px solid " + (isActive ? "rgba(0,201,167,0.4)" : "rgba(255,255,255,0.1)"), borderRadius:8, padding:"6px 12px", cursor:"pointer", color: isActive ? "var(--teal)" : "var(--grey3)", fontSize:11, fontWeight:600 }}>
              v{h.version} · {new Date(h.submittedAt).toLocaleDateString("en-GB", { day:"numeric", month:"short" })}
            </button>
          );
        })}
        {history.length > 1 && (
          <button onClick={() => { setCompareMode(!compareMode); setViewVersion(null); setCompareV(null); }}
            style={{ background: compareMode ? "rgba(255,193,7,0.15)" : "rgba(255,255,255,0.05)", border:"1px solid " + (compareMode ? "rgba(255,193,7,0.4)" : "rgba(255,255,255,0.1)"), borderRadius:8, padding:"6px 12px", cursor:"pointer", color: compareMode ? "#FFC107" : "var(--grey3)", fontSize:11, fontWeight:600 }}>
            ⟺ Compare versions
          </button>
        )}
      </div>

      {/* Single version view */}
      {viewVersion !== null && history[viewVersion] && (
        <div style={{ background:"var(--navy2)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:12, padding:"14px 16px", marginBottom:14 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"var(--teal)", marginBottom:12 }}>
            Version {history[viewVersion].version} — submitted {new Date(history[viewVersion].submittedAt).toLocaleString("en-GB", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" })}
          </div>
          {chObj && chObj.sections.map(function(s, i) {
            const text = history[viewVersion].drafts[i] || "";
            if (!text.trim()) return null;
            return (
              <div key={i} style={{ marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"var(--grey2)", marginBottom:5 }}>{chapterNum}.{i+1} {s.name}</div>
                <div style={{ fontSize:12, color:"var(--grey3)", lineHeight:1.8, whiteSpace:"pre-wrap" }}>{text}</div>
              </div>
            );
          })}
        </div>
      )}

      {/* Compare mode */}
      {compareMode && (
        <div>
          <div style={{ fontSize:11, color:"var(--grey3)", marginBottom:10 }}>Select two versions to compare:</div>
          <div style={{ display:"flex", gap:7, marginBottom:14, flexWrap:"wrap" }}>
            {history.map(function(h, i) {
              const sel = compareV !== null && compareV === i;
              return (
                <button key={i} onClick={() => setCompareV(sel ? null : i)}
                  style={{ background: sel ? "rgba(255,193,7,0.15)" : "rgba(255,255,255,0.05)", border:"1px solid " + (sel ? "rgba(255,193,7,0.4)" : "rgba(255,255,255,0.1)"), borderRadius:8, padding:"6px 12px", cursor:"pointer", color: sel ? "#FFC107" : "var(--grey3)", fontSize:11, fontWeight:600 }}>
                  v{h.version}
                </button>
              );
            })}
          </div>

          {compareV !== null && history[compareV] && (
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
              {/* Latest (current) vs selected */}
              {[history[history.length-1], history[compareV]].map(function(ver, col) {
                return (
                  <div key={col} style={{ background:"var(--navy2)", border:"1px solid " + (col===0 ? "rgba(0,201,167,0.25)" : "rgba(255,193,7,0.25)"), borderRadius:12, padding:"12px 14px" }}>
                    <div style={{ fontSize:10, fontWeight:700, color: col===0 ? "var(--teal)" : "#FFC107", marginBottom:10, textTransform:"uppercase", letterSpacing:"0.08em" }}>
                      {col===0 ? "Latest (v" + ver.version + ")" : "v" + ver.version}
                    </div>
                    {chObj && chObj.sections.map(function(s, i) {
                      const text = ver.drafts[i] || "";
                      if (!text.trim()) return null;
                      return (
                        <div key={i} style={{ marginBottom:12 }}>
                          <div style={{ fontSize:10, fontWeight:700, color:"var(--grey2)", marginBottom:4 }}>{chapterNum}.{i+1} {s.name}</div>
                          <div style={{ fontSize:11, color:"var(--grey3)", lineHeight:1.75, whiteSpace:"pre-wrap" }}>{text}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function SubmissionViewer({ project, chapter, drafts, supervisorFeedback, onClose, onDownload }) {
  const hl = supervisorFeedback ? (supervisorFeedback.highlights || {}) : {};
  const wordCount = Object.values(drafts).join(" ").split(/\s+/).filter(Boolean).length;
  const hasFeedback = supervisorFeedback && (supervisorFeedback.feedback || supervisorFeedback.sectionComments);
  const statusColor = { pending:"var(--grey3)", approved:"#4CAF50", minor:"#FFC107", major:"#FF7043" };
  const statusLabel = { pending:"Pending review", approved:"Approved", minor:"Minor revision needed", major:"Major revision needed" };
  const sc = supervisorFeedback ? (supervisorFeedback.sectionComments || {}) : {};

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}
      onClick={onClose}>
      <div style={{ background:"var(--navy2)", border:"1px solid rgba(0,201,167,0.3)", borderRadius:16, width:"100%", maxWidth:620, maxHeight:"90vh", display:"flex", flexDirection:"column" }}
        onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ padding:"16px 20px", borderBottom:"1px solid rgba(255,255,255,0.08)", display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12, flexShrink:0 }}>
          <div>
            <div style={{ fontSize:10, fontWeight:600, color:"var(--teal)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:4 }}>
              {hasFeedback ? "Supervisor Feedback" : "Submitted Chapter"}
            </div>
            <div style={{ fontFamily:"var(--font-d)", fontSize:16, fontWeight:700, color:"var(--white)", marginBottom:2 }}>Chapter {chapter.num}: {chapter.title}</div>
            <div style={{ fontSize:11, color:"var(--grey3)", display:"flex", alignItems:"center", gap:8 }}>
              <span>{wordCount} words</span>
              {hasFeedback && supervisorFeedback.status && (
                <span style={{ color: statusColor[supervisorFeedback.status] || "var(--grey3)", fontWeight:600 }}>
                  · {statusLabel[supervisorFeedback.status] || supervisorFeedback.status}
                </span>
              )}
            </div>
          </div>
          <div style={{ display:"flex", gap:8, flexShrink:0 }}>
            <button onClick={onDownload}
              style={{ background:"rgba(0,201,167,0.12)", color:"var(--teal)", border:"1px solid rgba(0,201,167,0.3)", borderRadius:8, padding:"7px 12px", fontFamily:"var(--font-d)", fontWeight:700, fontSize:12, cursor:"pointer", whiteSpace:"nowrap" }}>
              Download
            </button>
            <button onClick={onClose}
              style={{ background:"rgba(255,255,255,0.07)", color:"var(--grey3)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"7px 12px", fontFamily:"var(--font-d)", fontWeight:700, fontSize:12, cursor:"pointer" }}>
              Close
            </button>
          </div>
        </div>

        {/* Overall feedback banner */}
        {hasFeedback && supervisorFeedback.feedback && (
          <div style={{ margin:"12px 20px 0", background:"rgba(0,201,167,0.06)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:10, padding:"12px 14px", flexShrink:0 }}>
            <div style={{ fontSize:10, fontWeight:700, color:"var(--teal)", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>Overall feedback from supervisor</div>
            <div style={{ fontSize:12, color:"var(--grey2)", lineHeight:1.8, whiteSpace:"pre-wrap" }}>{supervisorFeedback.feedback}</div>
          </div>
        )}

        {/* Sections */}
        <div style={{ overflowY:"auto", padding:"16px 20px 24px" }}>
          {chapter.sections.map((s, i) => {
            const text = drafts[i] || "";
            const comment = sc[i] || "";
            return (
              <div key={i} style={{ marginBottom:20, background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:12, overflow:"hidden" }}>
                {/* Section header */}
                <div style={{ padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.05)", display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontFamily:"var(--font-d)", fontSize:11, fontWeight:700, color:"var(--teal)" }}>{chapter.num}.{i+1}</span>
                  <span style={{ fontFamily:"var(--font-d)", fontSize:12, fontWeight:700, color:"var(--white)" }}>{s.name}</span>
                  <span style={{ fontSize:10, color:"var(--grey3)", marginLeft:"auto" }}>
                    {text.trim() ? text.split(/\s+/).filter(Boolean).length + " words" : "Not written"}
                  </span>
                  {comment && <span style={{ fontSize:10, color:"#FFC107", fontWeight:600, background:"rgba(255,193,7,0.1)", borderRadius:10, padding:"1px 7px" }}>Comment</span>}
                </div>

                {/* Student text */}
                <div style={{ padding:"12px 14px", borderBottom: comment ? "1px solid rgba(255,255,255,0.05)" : "none" }}>
                  {text.trim() ? (
                    <div style={{ fontSize:13, color:"var(--grey2)", lineHeight:1.85, whiteSpace:"pre-wrap" }}>{text}</div>
                  ) : (
                    <div style={{ fontSize:12, color:"var(--grey3)", fontStyle:"italic" }}>No content written for this section.</div>
                  )}
                </div>

                {/* Supervisor comment */}
                {comment && (
                  <div style={{ padding:"10px 14px", background:"rgba(255,193,7,0.04)", borderTop:"1px solid rgba(255,193,7,0.12)" }}>
                    <div style={{ fontSize:10, fontWeight:700, color:"#FFC107", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>
                      💬 Supervisor comment
                    </div>
                    <div style={{ fontSize:12, color:"var(--grey2)", lineHeight:1.75, whiteSpace:"pre-wrap" }}>{comment}</div>
                  </div>
                )}

                {/* Highlight comments */}
                {(hl[i] || []).filter(function(h) { return h.comment && h.comment.trim(); }).map(function(h) {
                  return (
                    <div key={h.id} style={{ padding:"10px 14px", background:"rgba(255,193,7,0.03)", borderTop:"1px solid rgba(255,193,7,0.1)" }}>
                      <div style={{ fontSize:10, fontWeight:700, color:"rgba(255,193,7,0.8)", marginBottom:4 }}>📌 On: {h.text.slice(0,70)}{h.text.length > 70 ? "..." : ""}</div>
                      <div style={{ fontSize:12, color:"var(--grey2)", lineHeight:1.7 }}>{h.comment}</div>
                    </div>
                  );
                })}
              </div>
            );
          })}
          {/* Revision history for student */}
          <RevisionHistory
            project={project}
            chapterNum={chapter.num}
          />
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  SUPERVISOR DASHBOARD — full addition
// ═══════════════════════════════════════════════════════════════

// Storage keys
// Student writes:  "projecta_submission_<studentName>_ch<N>"  (shared=true)
// Supervisor writes: "projecta_feedback_<studentName>_ch<N>"  (shared=true)
// Student index:   "projecta_students"  (shared=true)

// ── Role picker ─────────────────────────────────────────────────────────────
// ── Auth: Login + Sign Up ────────────────────────────────────────────────────
const DEPTS_AUTH = ["Economics","Accounting","Business Administration","Banking & Finance","Public Administration","Political Science","Sociology","Mass Communication","Law","Computer Science","Engineering","Agriculture","Nursing / Medical Sciences","Education","Other"];

function AuthScreen({ onLogin, savedSupervisor, onReturnToDashboard, onSwitchAccount }) {
  const [mode,     setMode]     = useState("login");   // "login" | "signup"
  const [role,     setRole]     = useState("student"); // "student" | "supervisor"
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [name,     setName]     = useState("");
  const [dept,     setDept]     = useState("");
  const [uni,      setUni]      = useState("");
  const [title,    setTitle]    = useState("");
  const [err,      setErr]      = useState("");
  const [loading,  setLoading]  = useState(false);
  const [showPass,    setShowPass]    = useState(false);
  const [resetStep,   setResetStep]   = useState(1); // 1=enter email, 2=new password
  const [resetEmail,  setResetEmail]  = useState("");
  const [newPass,     setNewPass]     = useState("");
  const [newPass2,    setNewPass2]    = useState("");
  const [resetMsg,    setResetMsg]    = useState("");

  const inp = { width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(0,201,167,0.25)", borderRadius:10, padding:"13px 16px", color:"var(--white)", fontSize:14, fontFamily:"var(--font-b)", outline:"none" };
  const lbl = { display:"block", fontSize:11, fontWeight:600, color:"var(--teal)", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:7 };

  const emailOk   = email.includes("@") && email.includes(".");
  const passOk    = password.length >= 6;
  const signupOk  = emailOk && passOk && name.trim().length > 2 && dept && uni.trim().length > 3;
  const loginOk   = emailOk && passOk;

  const handleLogin = async () => {
    setErr(""); setLoading(true);
    try {
      const key = email.toLowerCase().trim();
      let acc = null;

      // 1. In-memory cache (same session — fastest)
      if (ACCOUNTS_CACHE[key]) acc = ACCOUNTS_CACHE[key];

      // 2. window.storage — shared across ALL devices (primary source of truth)
      if (!acc) {
        try {
          if (window.storage) {
            const res = await window.storage.get(ACCOUNTS_KEY);
            if (res && res.value) { const parsed = JSON.parse(res.value); acc = parsed[key] || null; }
          }
        } catch(e) {}
      }

      // 3. localStorage — same-device cache (fallback if window.storage unavailable)
      if (!acc) {
        try {
          const lsVal = localStorage.getItem("pjt_" + ACCOUNTS_KEY);
          if (lsVal) { const parsed = JSON.parse(lsVal); acc = parsed[key] || null; }
        } catch(e) {}
      }

      // 4. ROLE_KEY fallback — recover account from last session on this device
      if (!acc) {
        try {
          const lsRole = localStorage.getItem("pjt_" + ROLE_KEY);
          if (lsRole) {
            const saved = JSON.parse(lsRole);
            if (saved.account && saved.account.email === key) acc = saved.account;
            if (!acc && saved.role === "supervisor" && saved.supervisor && saved.supervisor.email === key) {
              acc = Object.assign({ role:"supervisor" }, saved.supervisor);
            }
          }
        } catch(e) {}
      }

      if (!acc) { setErr("No account found. Please sign up first."); setLoading(false); return; }
      if (acc.password !== password) { setErr("Incorrect password. Check your password and try again."); setLoading(false); return; }

      ACCOUNTS_CACHE[key] = acc;
      onLogin(acc);
    } catch(e) { setErr("Something went wrong: " + e.message); }
    setLoading(false);
  };

  const handleSignup = async () => {
    setErr(""); setLoading(true);
    try {
      const res = await safeGet(ACCOUNTS_KEY);
      const stored = res && res.value ? JSON.parse(res.value) : {};
      const accounts = Object.assign({}, stored, ACCOUNTS_CACHE);
      const key = email.toLowerCase().trim();
      if (accounts[key]) { setErr("An account with this email already exists. Please log in."); setLoading(false); return; }
      let acc = { email: key, password, role, name: name.trim(), dept: dept.trim(), uni: uni.trim(), title: title.trim() };
      if (role === "supervisor") {
        const code = makeCode();
        const codeKey = "sup_code_" + code.replace("-","");
        const profile = { name: acc.name, dept: acc.dept, uni: acc.uni, email: key, code, codeKey, students: [] };
        SUP_CACHE[codeKey] = profile;
        acc.code = code;
        acc.codeKey = codeKey;
        // Save supervisor profile — localStorage first so it never hangs
        try { localStorage.setItem("pjt_" + codeKey, JSON.stringify(profile)); } catch(e) {}
        safeSet(codeKey, JSON.stringify(profile)); // fire-and-forget to Firestore
      }
      accounts[key] = acc;
      ACCOUNTS_CACHE[key] = acc;
      // Save accounts — localStorage first
      try { localStorage.setItem("pjt_" + ACCOUNTS_KEY, JSON.stringify(accounts)); } catch(e) {}
      safeSet(ACCOUNTS_KEY, JSON.stringify(accounts)); // fire-and-forget to Firestore
      // Immediately proceed — don't wait for Firestore
      onLogin(acc);
    } catch(e) { setErr("Sign up failed: " + e.message + ". Please try again."); }
    setLoading(false);
  };

  const handleResetLookup = async () => {
    setResetMsg(""); setLoading(true);
    try {
      const key = resetEmail.toLowerCase().trim();
      let found = false;
      // Check all storage layers — window.storage first (cross-device)
      if (ACCOUNTS_CACHE[key]) found = true;
      if (!found) {
        try { if (window.storage) { const r = await window.storage.get(ACCOUNTS_KEY); if (r && r.value) { const p = JSON.parse(r.value); if (p[key]) found = true; } } } catch(e) {}
      }
      if (!found) {
        try { const v = localStorage.getItem("pjt_" + ACCOUNTS_KEY); if (v) { const p = JSON.parse(v); if (p[key]) found = true; } } catch(e) {}
      }
      if (!found) { setResetMsg("No account found with that email."); setLoading(false); return; }
      setResetStep(2);
    } catch(e) { setResetMsg("Something went wrong. Try again."); }
    setLoading(false);
  };

  const handleResetSave = async () => {
    setResetMsg(""); setLoading(true);
    try {
      if (newPass.length < 6) { setResetMsg("Password must be at least 6 characters."); setLoading(false); return; }
      if (newPass !== newPass2) { setResetMsg("Passwords do not match."); setLoading(false); return; }
      const key = resetEmail.toLowerCase().trim();

      // Update in all storage layers
      // 1. ACCOUNTS_CACHE
      if (ACCOUNTS_CACHE[key]) ACCOUNTS_CACHE[key].password = newPass;

      // 2. window.storage (cross-device — primary)
      try {
        if (window.storage) {
          const r = await window.storage.get(ACCOUNTS_KEY);
          const accounts = r && r.value ? JSON.parse(r.value) : {};
          if (accounts[key]) {
            accounts[key].password = newPass;
            await window.storage.set(ACCOUNTS_KEY, JSON.stringify(accounts));
            if (!ACCOUNTS_CACHE[key]) ACCOUNTS_CACHE[key] = accounts[key];
          }
        }
      } catch(e) {}

      // 3. localStorage cache (same-device)
      try {
        const v = localStorage.getItem("pjt_" + ACCOUNTS_KEY);
        const accounts = v ? JSON.parse(v) : {};
        if (accounts[key]) {
          accounts[key].password = newPass;
          localStorage.setItem("pjt_" + ACCOUNTS_KEY, JSON.stringify(accounts));
        }
      } catch(e) {}

      setResetMsg("success");
    } catch(e) { setResetMsg("Something went wrong. Try again."); }
    setLoading(false);
  };

  // If there is a saved supervisor session, show that first
  if (savedSupervisor) {
    return (
      <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
        <div style={{ width:"100%", maxWidth:400, textAlign:"center" }} className="fu">
          <div style={{ margin:"0 auto 24px" }}><ProjectaWordmark size={84} /></div>
          <div style={{ fontSize:13, color:"var(--grey3)", marginBottom:20, lineHeight:1.6 }}>Welcome back</div>
          <div style={{ background:"rgba(0,201,167,0.07)", border:"1px solid rgba(0,201,167,0.25)", borderRadius:12, padding:"14px 18px", marginBottom:14, textAlign:"left" }}>
            <div style={{ fontSize:10, fontWeight:600, color:"var(--teal)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:5 }}>Signed in as supervisor</div>
            <div style={{ fontSize:14, fontWeight:700, color:"var(--white)", marginBottom:2 }}>{savedSupervisor.name}</div>
            <div style={{ fontSize:12, color:"var(--grey3)" }}>{savedSupervisor.dept} · {savedSupervisor.uni}</div>
          </div>
          <button onClick={onReturnToDashboard}
            style={{ width:"100%", background:"var(--teal)", color:"var(--navy)", border:"none", borderRadius:12, padding:"15px 0", fontFamily:"var(--font-d)", fontWeight:800, fontSize:16, cursor:"pointer", marginBottom:10 }}
            onMouseEnter={e => { e.target.style.background="var(--teal2)"; }}
            onMouseLeave={e => { e.target.style.background="var(--teal)"; }}>
            Return to dashboard →
          </button>
          <button onClick={onSwitchAccount}
            style={{ background:"transparent", border:"none", color:"var(--grey3)", fontSize:12, cursor:"pointer", textDecoration:"underline", marginTop:4 }}>
            Sign in as a different account
          </button>
        </div>
      </div>
    );
  }

  // ── Reset password view ────────────────────────────────────────────────────
  if (mode === "reset") {
    return (
      <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", alignItems:"center", justifyContent:"center", padding:"24px 16px" }}>
        <div style={{ width:"100%", maxWidth:420 }} className="fu">
          <div style={{ textAlign:"center", margin:"0 auto 28px" }}>
            <ProjectaWordmark size={80} />
          </div>

          <div style={{ background:"var(--navy2)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:16, padding:"28px 24px" }}>

            {resetMsg === "success" ? (
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:36, marginBottom:12 }}>✓</div>
                <div style={{ fontFamily:"var(--font-d)", fontSize:18, fontWeight:700, color:"var(--white)", marginBottom:8 }}>Password updated</div>
                <div style={{ fontSize:13, color:"var(--grey3)", marginBottom:24, lineHeight:1.6 }}>Your password has been changed successfully. You can now log in with your new password.</div>
                <button onClick={() => { setMode("login"); setResetStep(1); setResetEmail(""); setNewPass(""); setNewPass2(""); setResetMsg(""); }}
                  style={{ width:"100%", background:"var(--teal)", color:"var(--navy)", border:"none", borderRadius:10, padding:"13px 0", fontFamily:"var(--font-d)", fontWeight:700, fontSize:15, cursor:"pointer" }}>
                  Go to Log In →
                </button>
              </div>
            ) : (
              <>
                <button onClick={() => { setMode("login"); setResetStep(1); setResetMsg(""); }}
                  style={{ background:"none", border:"none", color:"var(--grey3)", fontSize:12, cursor:"pointer", marginBottom:18, padding:0, display:"flex", alignItems:"center", gap:4 }}>
                  ← Back to Log In
                </button>

                <div style={{ fontFamily:"var(--font-d)", fontSize:18, fontWeight:800, color:"var(--white)", marginBottom:6 }}>Reset Password</div>
                <div style={{ fontSize:13, color:"var(--grey3)", marginBottom:22, lineHeight:1.6 }}>
                  {resetStep === 1 ? "Enter your registered email address." : "Choose a new password for your account."}
                </div>

                {/* Step indicator */}
                <div style={{ display:"flex", gap:6, marginBottom:22 }}>
                  {[1,2].map(s => (
                    <div key={s} style={{ flex:1, height:3, borderRadius:999, background: s <= resetStep ? "var(--teal)" : "rgba(255,255,255,0.1)" }} />
                  ))}
                </div>

                {resetStep === 1 ? (
                  <>
                    <div style={{ marginBottom:18 }}>
                      <label style={lbl}>Email Address</label>
                      <input style={inp} type="email" placeholder="your@email.com" value={resetEmail} onChange={e => setResetEmail(e.target.value)} />
                    </div>
                    {resetMsg && <div style={{ color:"#FF6B6B", fontSize:13, marginBottom:14 }}>{resetMsg}</div>}
                    <button onClick={handleResetLookup} disabled={loading || !resetEmail.includes("@")}
                      style={{ width:"100%", background: resetEmail.includes("@") ? "var(--teal)" : "rgba(0,201,167,0.2)", color: resetEmail.includes("@") ? "var(--navy)" : "var(--grey3)", border:"none", borderRadius:10, padding:"13px 0", fontFamily:"var(--font-d)", fontWeight:700, fontSize:15, cursor: resetEmail.includes("@") ? "pointer" : "not-allowed" }}>
                      {loading ? "Checking..." : "Continue →"}
                    </button>
                  </>
                ) : (
                  <>
                    <div style={{ background:"rgba(0,201,167,0.07)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:8, padding:"9px 14px", fontSize:13, color:"var(--teal)", marginBottom:18 }}>
                      Account found: {resetEmail}
                    </div>
                    <div style={{ marginBottom:14 }}>
                      <label style={lbl}>New Password</label>
                      <input style={inp} type="password" placeholder="Min. 6 characters" value={newPass} onChange={e => setNewPass(e.target.value)} />
                    </div>
                    <div style={{ marginBottom:18 }}>
                      <label style={lbl}>Confirm New Password</label>
                      <input style={inp} type="password" placeholder="Repeat your new password" value={newPass2} onChange={e => setNewPass2(e.target.value)} />
                    </div>
                    {resetMsg && <div style={{ color:"#FF6B6B", fontSize:13, marginBottom:14 }}>{resetMsg}</div>}
                    <button onClick={handleResetSave} disabled={loading || newPass.length < 6 || newPass !== newPass2}
                      style={{ width:"100%", background: newPass.length >= 6 && newPass === newPass2 ? "var(--teal)" : "rgba(0,201,167,0.2)", color: newPass.length >= 6 && newPass === newPass2 ? "var(--navy)" : "var(--grey3)", border:"none", borderRadius:10, padding:"13px 0", fontFamily:"var(--font-d)", fontWeight:700, fontSize:15, cursor: newPass.length >= 6 && newPass === newPass2 ? "pointer" : "not-allowed" }}>
                      {loading ? "Saving..." : "Save new password →"}
                    </button>
                  </>
                )}
              </>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", alignItems:"center", justifyContent:"center", padding:"24px 16px" }}>
      <div style={{ width:"100%", maxWidth:420 }} className="fu">
        <div style={{ textAlign:"center", margin:"0 auto 28px" }}>
          <ProjectaWordmark size={80} />
        </div>

        {/* Mode tabs */}
        <div style={{ display:"flex", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:12, padding:4, marginBottom:24 }}>
          {["login","signup"].map(m => (
            <button key={m} onClick={() => { setMode(m); setErr(""); }}
              style={{ flex:1, background: mode===m ? "rgba(0,201,167,0.15)" : "transparent", border: mode===m ? "1px solid rgba(0,201,167,0.35)" : "1px solid transparent", borderRadius:9, padding:"10px 0", color: mode===m ? "var(--teal)" : "var(--grey3)", fontFamily:"var(--font-d)", fontWeight:700, fontSize:14, cursor:"pointer", transition:"all 0.2s" }}>
              {m === "login" ? "Log In" : "Sign Up"}
            </button>
          ))}
        </div>

        {/* Role toggle (signup only) */}
        {mode === "signup" && (
          <div style={{ display:"flex", gap:10, marginBottom:20 }}>
            {["student","supervisor"].map(r => (
              <button key={r} onClick={() => setRole(r)}
                style={{ flex:1, background: role===r ? "rgba(0,201,167,0.1)" : "rgba(255,255,255,0.03)", border: role===r ? "1px solid rgba(0,201,167,0.45)" : "1px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"11px 0", color: role===r ? "var(--teal)" : "var(--grey3)", fontFamily:"var(--font-d)", fontWeight:700, fontSize:13, cursor:"pointer", transition:"all 0.2s" }}>
                {r === "student" ? "👨‍🎓 Student" : "🎓 Supervisor"}
              </button>
            ))}
          </div>
        )}

        {/* Sign-up fields */}
        {mode === "signup" && (
          <>
            {role === "supervisor" && (
              <div style={{ marginBottom:14 }}>
                <label style={lbl}>Academic Title</label>
                <select style={{ ...inp, cursor:"pointer", color: title ? "var(--white)" : "var(--grey3)" }} value={title} onChange={e => setTitle(e.target.value)}>
                  <option value="" style={{ background:"#1A2E42", color:"var(--grey3)" }}>Select title (optional)</option>
                  {["Dr.","Prof.","Assoc. Prof.","Mr.","Mrs.","Ms.","Engr.","Barr."].map(t => (
                    <option key={t} value={t} style={{ background:"#1A2E42", color:"var(--white)" }}>{t}</option>
                  ))}
                </select>
              </div>
            )}
            <div style={{ marginBottom:14 }}>
              <label style={lbl}>Full Name</label>
              <input style={inp} placeholder={role==="student" ? "e.g. Chisom Okafor" : "e.g. Aisha Bello"} value={name} onChange={e => setName(e.target.value)} />
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={lbl}>Department</label>
              <select style={{ ...inp, cursor:"pointer", color: dept ? "var(--white)" : "var(--grey3)" }} value={dept} onChange={e => setDept(e.target.value)}>
                <option value="" disabled style={{ background:"#1A2E42" }}>Select department</option>
                {DEPTS_AUTH.map(d => <option key={d} value={d} style={{ background:"#1A2E42", color:"var(--white)" }}>{d}</option>)}
              </select>
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={lbl}>University</label>
              <input style={inp} placeholder="e.g. University of Mkar" value={uni} onChange={e => setUni(e.target.value)} />
            </div>
          </>
        )}

        {/* Email + Password (always shown) */}
        <div style={{ marginBottom:14 }}>
          <label style={lbl}>Email Address</label>
          <input style={inp} type="email" placeholder="you@university.edu.ng" value={email} onChange={e => setEmail(e.target.value)} />
        </div>
        <div style={{ marginBottom:22 }}>
          <label style={lbl}>Password {mode==="signup" && <span style={{ color:"var(--grey3)", fontWeight:400, textTransform:"none", fontSize:10 }}>— min. 6 characters</span>}</label>
          <div style={{ position:"relative" }}>
            <input style={{ ...inp, paddingRight:44 }} type={showPass ? "text" : "password"} placeholder={mode==="signup" ? "Create a password" : "Your password"} value={password} onChange={e => setPassword(e.target.value)} />
            <button onClick={() => setShowPass(p => !p)} style={{ position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"var(--grey3)", cursor:"pointer", fontSize:13, padding:0 }}>
              {showPass ? "Hide" : "Show"}
            </button>
          </div>
        </div>

        {mode === "login" && (
          <div style={{ textAlign:"right", marginTop:-14, marginBottom:16 }}>
            <button onClick={() => { setMode("reset"); setResetStep(1); setResetEmail(email); setResetMsg(""); setErr(""); }}
              style={{ background:"none", border:"none", color:"var(--grey3)", fontSize:12, cursor:"pointer", textDecoration:"underline", padding:0 }}>
              Forgot password?
            </button>
          </div>
        )}

        {/* Error */}
        {err && (
          <div style={{ background:"rgba(255,80,80,0.1)", border:"1px solid rgba(255,80,80,0.3)", borderRadius:8, padding:"10px 14px", fontSize:13, color:"#FF6B6B", marginBottom:16 }}>
            {err}
            {err.includes("No account") && (
              <div style={{ marginTop:8 }}>
                <button onClick={() => { setMode("signup"); setErr(""); }}
                  style={{ background:"transparent", border:"none", color:"var(--teal)", fontSize:12, cursor:"pointer", textDecoration:"underline", padding:0 }}>
                  Create a new account instead →
                </button>
              </div>
            )}
          </div>
        )}

        {/* Submit */}
        <button
          onClick={mode === "login" ? handleLogin : handleSignup}
          disabled={loading || (mode==="login" ? !loginOk : !signupOk)}
          style={{ width:"100%", background: (mode==="login" ? loginOk : signupOk) ? "var(--teal)" : "rgba(0,201,167,0.2)", color: (mode==="login" ? loginOk : signupOk) ? "var(--navy)" : "var(--grey3)", border:"none", borderRadius:10, padding:"14px 0", fontFamily:"var(--font-d)", fontWeight:700, fontSize:15, cursor: (mode==="login" ? loginOk : signupOk) ? "pointer" : "not-allowed", display:"flex", alignItems:"center", justifyContent:"center" }}>
          {loading ? <Spinner /> : null}
          {loading ? "Please wait..." : mode === "login" ? "Log in →" : "Create account →"}
        </button>

        <div style={{ textAlign:"center", marginTop:16, fontSize:12, color:"var(--grey3)" }}>
          {mode === "login"
            ? <span>No account? <button onClick={() => { setMode("signup"); setErr(""); }} style={{ background:"none", border:"none", color:"var(--teal)", cursor:"pointer", fontSize:12, textDecoration:"underline" }}>Sign up free</button></span>
            : <span>Already have an account? <button onClick={() => { setMode("login"); setErr(""); }} style={{ background:"none", border:"none", color:"var(--teal)", cursor:"pointer", fontSize:12, textDecoration:"underline" }}>Log in</button></span>
          }
        </div>
      </div>
    </div>
  );
}

// NOTIFICATION BELL
// ═══════════════════════════════════════════════════════════════
function NotificationBell({ userKey }) {
  const [open,    setOpen]    = useState(false);
  const [notes,   setNotes]   = useState([]);
  const unread = notes.filter(function(n){ return !n.read; }).length;

  useEffect(function() {
    if (!userKey) return;
    try {
      const stored = localStorage.getItem("pjt_notifs_" + userKey);
      if (stored) setNotes(JSON.parse(stored));
    } catch(e) {}
  }, [userKey]);

  const markAllRead = function() {
    const updated = notes.map(function(n){ return { ...n, read: true }; });
    setNotes(updated);
    try { localStorage.setItem("pjt_notifs_" + userKey, JSON.stringify(updated)); } catch(e) {}
  };

  const clearAll = function() {
    setNotes([]);
    try { localStorage.setItem("pjt_notifs_" + userKey, JSON.stringify([])); } catch(e) {}
  };

  if (!open) {
    return (
      <div style={{ position:"relative", display:"inline-block" }}>
        <button onClick={() => { setOpen(true); markAllRead(); }}
          style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, width:36, height:34, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", position:"relative" }}>
          <span style={{ fontSize:16 }}>🔔</span>
          {unread > 0 && (
            <span style={{ position:"absolute", top:-4, right:-4, background:"#FF7043", color:"white", borderRadius:"50%", width:16, height:16, fontSize:9, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center" }}>
              {unread > 9 ? "9+" : unread}
            </span>
          )}
        </button>
      </div>
    );
  }

  return (
    <div style={{ position:"relative", display:"inline-block" }}>
      <button onClick={() => setOpen(false)}
        style={{ background:"rgba(0,201,167,0.1)", border:"1px solid rgba(0,201,167,0.3)", borderRadius:8, width:36, height:34, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer" }}>
        <span style={{ fontSize:16 }}>🔔</span>
      </button>

      {/* Dropdown */}
      <div style={{ position:"absolute", top:42, right:0, width:300, background:"#1A2E3F", border:"1px solid rgba(255,255,255,0.1)", borderRadius:12, boxShadow:"0 16px 40px rgba(0,0,0,0.5)", zIndex:500, overflow:"hidden" }}>
        <div style={{ padding:"12px 14px", borderBottom:"1px solid rgba(255,255,255,0.07)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontFamily:"var(--font-d)", fontWeight:700, fontSize:13, color:"var(--white)" }}>Notifications</span>
          <div style={{ display:"flex", gap:8 }}>
            {notes.length > 0 && (
              <button onClick={clearAll} style={{ background:"transparent", border:"none", color:"rgba(255,112,67,0.7)", fontSize:11, cursor:"pointer" }}>Clear all</button>
            )}
            <button onClick={() => setOpen(false)} style={{ background:"transparent", border:"none", color:"var(--grey3)", fontSize:14, cursor:"pointer" }}>✕</button>
          </div>
        </div>

        <div style={{ maxHeight:320, overflowY:"auto" }}>
          {notes.length === 0 ? (
            <div style={{ padding:"24px 14px", textAlign:"center", color:"var(--grey3)", fontSize:12, fontStyle:"italic" }}>
              No notifications yet
            </div>
          ) : (
            notes.slice().reverse().map(function(n, i) {
              return (
                <div key={i} style={{ padding:"11px 14px", borderBottom:"1px solid rgba(255,255,255,0.05)", background: n.read ? "transparent" : "rgba(0,201,167,0.04)" }}>
                  <div style={{ fontSize:12, color:"var(--white)", lineHeight:1.5, marginBottom:3 }}>{n.message}</div>
                  <div style={{ fontSize:10, color:"var(--grey3)" }}>{n.time}</div>
                </div>
              );
            })
          )}
        </div>
      </div>

      {/* Backdrop */}
      <div style={{ position:"fixed", inset:0, zIndex:499 }} onClick={() => setOpen(false)} />
    </div>
  );
}

// Helper to push a notification into localStorage
function pushNotification(userKey, message) {
  if (!userKey) return;
  try {
    const stored = localStorage.getItem("pjt_notifs_" + userKey);
    const existing = stored ? JSON.parse(stored) : [];
    const now = new Date();
    const time = now.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" }) + " · " + now.toLocaleDateString("en-GB", { day:"numeric", month:"short" });
    const updated = [...existing, { message, time, read: false }].slice(-30); // keep last 30
    localStorage.setItem("pjt_notifs_" + userKey, JSON.stringify(updated));
  } catch(e) {}
}

function StudentDashboard({ project, allDrafts, account, onGoToChapter, onGoToChapters, onViewSubmission, onSignOut }) {

    "Save your citations as you find them — collecting them at the end is painful.",
    "Word count matters less than argument quality. Say it clearly, then expand.",
    "Your supervisor's feedback is a gift. Act on every point before resubmitting.",

  useEffect(() => {
    // Load which feedback items have already been read
    try {
      const readKey = "read_fb_" + (project.studentName || "").trim().toLowerCase().replace(/\s+/g,"_");

  }, [project.studentName]);

  useEffect(() => {
    const load = async () => {
      if (!project || !project.supervisorCodeKey) { setLoadingFeedback(false); return; }
      const fb = {};
      const prof = SUP_CACHE[project.supervisorCodeKey];
      if (prof && prof.feedback && prof.feedback[project.studentName]) {

          fb[parseInt(k)] = prof.feedback[project.studentName][k];
        });

      for (let n = 1; n <= 5; n++) {
        const sKey = (project.studentName || "").trim().toLowerCase().replace(/\s+/g, "_");

    load();
    const t = setInterval(() => setTipIdx(i => (i + 1) % 6), 7000);
    return () => clearInterval(t);

  const submitted      = project.submitted || {};
  const submittedNums  = Object.keys(submitted).map(Number);

  const totalWords     = Object.values(allDrafts).reduce((tot, chDraft) =>

  return (

      {/* Nav */}
      <div className="rp-nav">
        <ProjectaIcon size={30} />
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <button onClick={onGoToChapters}
            style={{ background:"rgba(0,201,167,0.08)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:8, padding:"6px 13px", color:"var(--teal)", fontSize:12, cursor:"pointer", fontWeight:600 }}>
            Chapters
          </button>
          <NotificationBell userKey={(account && account.email) ? account.email.replace(/[^a-z0-9]/gi,"_") : "student"} />
          <button onClick={onSignOut}
            style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"6px 13px", color:"var(--grey3)", fontSize:12, cursor:"pointer" }}>
            Sign out
          </button>
        </div>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"26px 0 40px" }}><div className="rp-container">

        {/* Greeting */}
        <div style={{ marginBottom:24 }} className="fu">
          <div style={{ fontSize:11, fontWeight:600, color:"var(--teal)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>
            {project.dept} · {project.uni}
          </div>
          <div style={{ fontFamily:"var(--font-d)", fontSize:24, fontWeight:800, color:"var(--white)", letterSpacing:"-0.5px", lineHeight:1.25, marginBottom:6 }}>
            {"Welcome back, " + firstName + "."}
          </div>
          <div style={{ fontSize:13, color:"var(--grey3)", lineHeight:1.6 }}>{project.topic}</div>
        </div>

        {/* Progress card */}
        <div style={{ ...card, marginBottom:14 }} className="fu">
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:14 }}>
            <div>
              <div style={{ fontFamily:"var(--font-d)", fontSize:13, fontWeight:700, color:"var(--white)", marginBottom:3 }}>Overall Progress</div>
              <div style={{ fontSize:11, color:"var(--grey3)" }}>{submittedCount} of 5 chapters submitted · {totalWords.toLocaleString()} words</div>
            </div>
            <div style={{ fontFamily:"var(--font-d)", fontSize:28, fontWeight:800, color:"var(--teal)", lineHeight:1 }}>{pct}<span style={{ fontSize:14, color:"var(--grey3)" }}>%</span></div>
          </div>
          {/* Big progress bar */}
          <div style={{ background:"rgba(255,255,255,0.06)", borderRadius:999, height:10, overflow:"hidden", marginBottom:14 }}>
            <div style={{ height:"100%", width:pct + "%", background:"linear-gradient(90deg, #007A65, #00C9A7)", borderRadius:999, transition:"width 0.7s ease" }} />
          </div>
          {/* Chapter pills */}
          <div style={{ display:"flex", gap:6 }}>
            {CHAPTERS.map(ch => {
              const done = !!submitted[ch.num];
              const fb   = feedback[ch.num];
              const dot  = done ? (fb ? statusColor[fb.status] || "#4CAF50" : "#4CAF50") : "rgba(255,255,255,0.15)";
              return (
                <button key={ch.num} onClick={() => onGoToChapter(ch)}
                  style={{ flex:1, background: done ? "rgba(0,201,167,0.07)" : "rgba(255,255,255,0.03)", border:"1px solid " + (done ? "rgba(0,201,167,0.22)" : "rgba(255,255,255,0.07)"), borderRadius:9, padding:"9px 4px", cursor:"pointer", textAlign:"center", transition:"all 0.15s" }}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = "rgba(0,201,167,0.45)"; e.currentTarget.style.background = "rgba(0,201,167,0.1)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = done ? "rgba(0,201,167,0.22)" : "rgba(255,255,255,0.07)"; e.currentTarget.style.background = done ? "rgba(0,201,167,0.07)" : "rgba(255,255,255,0.03)"; }}>

            <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
              {hasFeedback.map(n => {
                const fb = feedback[n];

                      // Mark this feedback as read

                        localStorage.setItem("pjt_" + readKey, JSON.stringify(updated));
                      } catch(e) {}
                      onViewSubmission && onViewSubmission(ch, feedback[n]);

                    style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:9, padding:"10px 14px", cursor:"pointer", transition:"all 0.15s" }}

                    onMouseLeave={e => { e.currentTarget.style.borderColor = "rgba(255,255,255,0.07)"; }}>
                    <div>

                      <div style={{ fontSize:11, fontWeight:600, color: statusColor[fb.status] || "var(--grey3)" }}>

            {project.supervisorName ? (
              <>
                <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:10 }}>
                  <div style={{ width:34, height:34, borderRadius:"50%", background:"rgba(0,201,167,0.12)", border:"1px solid rgba(0,201,167,0.28)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"var(--font-d)", fontWeight:700, fontSize:14, color:"var(--teal)", flexShrink:0 }}>
                    {project.supervisorName.replace("Code: ","").charAt(0).toUpperCase()}
                  </div>
                  <div style={{ minWidth:0 }}>
                    <div style={{ fontSize:13, fontWeight:600, color:"var(--white)", lineHeight:1.3 }}>{project.supervisorName.replace("Code: ","")}</div>

                  </div>
                </div>
                <div style={{ display:"inline-flex", alignItems:"center", gap:5, background:"rgba(0,201,167,0.07)", border:"1px solid rgba(0,201,167,0.18)", borderRadius:20, padding:"3px 10px" }}>

                  <span style={{ fontSize:10, color:"var(--teal)", fontWeight:600 }}>Connected</span>
                </div>
              </>

              <div style={{ fontSize:12, color:"var(--grey3)", lineHeight:1.6 }}>No supervisor connected yet.</div>

        </div>

        {/* Stats row */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:14 }}>
          {[
            { icon:"✍️", val: totalWords.toLocaleString(), label:"Words written" },
            { icon:"📤", val: submittedCount + "/5",        label:"Submitted" },
            { icon:"💬", val: submittedNums.filter(n => feedback[n]).length, label:"Feedback items" },
          ].map((s, i) => (
            <div key={i} style={{ ...card, textAlign:"center", padding:"14px 8px" }}>
              <div style={{ fontSize:18, marginBottom:4 }}>{s.icon}</div>
              <div style={{ fontFamily:"var(--font-d)", fontSize:20, fontWeight:800, color:"var(--teal)", lineHeight:1, marginBottom:3 }}>{s.val}</div>
              <div style={{ fontSize:10, color:"var(--grey3)", fontWeight:600 }}>{s.label}</div>

          ))}
        </div>

        {/* Quick actions */}
        <div style={{ ...card, marginBottom:14 }}>
          <div style={{ fontSize:10, fontWeight:600, color:"var(--grey3)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:12 }}>Quick Actions</div>
          <div className="rp-grid-4" style={{ display:"grid", gap:8 }}>
            {[
              { icon:"📋", label:"All chapters",    sub:"Full chapter list & status",       fn: onGoToChapters },
              { icon:"✍️", label:"Continue writing", sub: nextChapter ? "Ch." + nextChapter.num + " — " + nextChapter.title : "All chapters done", fn: nextChapter ? () => onGoToChapter(nextChapter) : onGoToChapters },
              { icon:"💬", label:"Check feedback",  sub: hasFeedback.length > 0 ? hasFeedback.length + " item(s) waiting" : "No new feedback",    fn: onGoToChapters },
              { icon:"📚", label:"View progress",   sub:"Track all 5 chapters",             fn: onGoToChapters },
            ].map((a, i) => (
              <button key={i} onClick={a.fn}
                style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"12px 14px", cursor:"pointer", textAlign:"left", transition:"all 0.15s" }}
                onMouseEnter={e => { e.currentTarget.style.background = "rgba(0,201,167,0.06)"; e.currentTarget.style.borderColor = "rgba(0,201,167,0.25)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.03)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.07)"; }}>
                <div style={{ fontSize:18, marginBottom:5 }}>{a.icon}</div>
                <div style={{ fontSize:12, fontWeight:700, color:"var(--white)", marginBottom:2 }}>{a.label}</div>
                <div style={{ fontSize:11, color:"var(--grey3)", lineHeight:1.4 }}>{a.sub}</div>
              </button>
            ))}
          </div>
        </div>

        {/* Rotating tip */}
        <div style={{ background:"rgba(0,201,167,0.04)", border:"1px solid rgba(0,201,167,0.13)", borderRadius:12, padding:"14px 18px" }}>
          <div style={{ fontSize:10, fontWeight:600, color:"var(--teal)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>💡 Writing Tip</div>
          <div key={tipIdx} className="fi" style={{ fontSize:13, color:"rgba(196,201,208,0.9)", lineHeight:1.75, fontStyle:"italic" }}>
            {TIPS[tipIdx]}
          </div>
        </div>

      </div></div>
    </div>
  );
}
