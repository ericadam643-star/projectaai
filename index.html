  const [aiLoading,    setAiLoading]    = useState(false);
  const [aiSuggestion, setAiSuggestion] = useState("");
  const [view,         setView]         = useState("overview");
  const [sectionComments, setSectionComments] = useState({});
  const [highlights,     setHighlights]     = useState({});
  const [activeHighlight,setActiveHighlight]= useState(null);
  const [hlComment,      setHlComment]      = useState("");
  const [aiSummary,      setAiSummary]      = useState("");
  const [summaryLoading, setSummaryLoading] = useState(false);
  const [showSummary,    setShowSummary]    = useState(false);

  // Normalise a name the same way both student and supervisor do
  const normName = (n) => n.trim().toLowerCase().replace(/\s+/g,"_");

  const loadStudents = async (isRefresh) => {
    if (isRefresh) setRefreshing(true); else setLoading(true);
    try {
      if (!supervisor.codeKey) { setLoading(false); setRefreshing(false); return; }
      // Always fetch fresh from Firestore so supervisor sees newly connected students
      let profile = null;
      if (window._db) {
        try {
          const doc = await withTimeout(window._db.collection("pjt").doc(supervisor.codeKey).get(), 7000);
          if (doc.exists) {
            profile = JSON.parse(doc.data().v);
            SUP_CACHE[supervisor.codeKey] = profile;
            try { localStorage.setItem("pjt_" + supervisor.codeKey, doc.data().v); } catch(e) {}
          }
        } catch(e) { console.warn("Firestore fetch failed, using cache:", e.message); }
      }
      // Fallback to cache / localStorage if Firestore unavailable
      if (!profile) {
        profile = SUP_CACHE[supervisor.codeKey] || null;
        if (!profile) {
          try { const v = localStorage.getItem("pjt_" + supervisor.codeKey); if (v) profile = JSON.parse(v); } catch(e) {}
        }
        if (!profile && window.storage) {
          const r2 = await safeGet(supervisor.codeKey); if (r2 && r2.value) profile = JSON.parse(r2.value);
        }
      }
      if (profile) {
        SUP_CACHE[supervisor.codeKey] = profile;
        const list = profile.students || [];
        const enriched = await Promise.all(list.map(async (s) => {
          const submittedChapters = {};
          const feedbackStatus = {};
          const sKey = s.studentName.trim().toLowerCase().replace(/\s+/g,"_");
          for (let n = 1; n <= 5; n++) {
            // Load submission
            if (profile.submissions && profile.submissions[s.studentName] && profile.submissions[s.studentName][n]) {
              submittedChapters[n] = profile.submissions[s.studentName][n];
            } else {
              const subKey = supervisor.codeKey + "_sub_" + sKey + "_ch" + n;
              const sub = await safeGet(subKey);
              if (sub && sub.value) submittedChapters[n] = JSON.parse(sub.value);
            }
            // Load feedback status — always check fbKey directly (most accurate)
            if (submittedChapters[n]) {
              const fbKey = supervisor.codeKey + "_fb_" + sKey + "_ch" + n;
              const resubFlagKey = supervisor.codeKey + "_resub_" + sKey + "_ch" + n;
              // Check resubmit flag first — student may have resubmitted after last feedback
              const resubFlag = await safeGet(resubFlagKey);
              if (resubFlag && resubFlag.value) {
                // Student resubmitted — always treat as pending regardless of old reviewStatus
                feedbackStatus[n] = "pending";
                // Update profile.reviewStatus to reflect this
                if (!profile.reviewStatus) profile.reviewStatus = {};
                if (!profile.reviewStatus[s.studentName]) profile.reviewStatus[s.studentName] = {};
                profile.reviewStatus[s.studentName][n] = "pending";
              } else if (profile.reviewStatus && profile.reviewStatus[s.studentName] && profile.reviewStatus[s.studentName][n]) {
                feedbackStatus[n] = profile.reviewStatus[s.studentName][n];
              } else {
                // Fallback: read from separate feedback key
                const fb = await safeGet(fbKey);
                if (fb && fb.value) {
                  const parsed = JSON.parse(fb.value);
                  feedbackStatus[n] = parsed.status || "pending";
                  if (!profile.reviewStatus) profile.reviewStatus = {};
                  if (!profile.reviewStatus[s.studentName]) profile.reviewStatus[s.studentName] = {};
                  profile.reviewStatus[s.studentName][n] = feedbackStatus[n];
                }
              }
            }
          }
          return { ...s, name: s.studentName, submittedChapters, feedbackStatus };
        }));
        setStudents(enriched);
        // Pre-populate reviewedKeys — chapters with saved feedback are "reviewed"
        // EXCEPT: if student has resubmitted since last feedback, treat as pending again
        const keys = new Set();
        enriched.forEach(s => {
          Object.entries(s.feedbackStatus || {}).forEach(([chNum, st]) => {
            // Only mark reviewed if status is not pending (pending means resubmitted)
            if (st && st !== "pending") keys.add(s.name + "_" + parseInt(chNum));
          });
        });
        setReviewedKeys(keys);
      } else {
        setStudents([]);
        setReviewedKeys(new Set());
      }
    } catch(e) { console.error("loadStudents:", e); setStudents([]); }
    setLoading(false);
    setRefreshing(false);
  };

  useEffect(() => { loadStudents(false); }, [supervisor.codeKey]);

  // Auto-refresh every 30 seconds so supervisor sees new students in real time
  useEffect(() => {
    const interval = setInterval(() => { loadStudents(true); }, 30000);
    return () => clearInterval(interval);
  }, [supervisor.codeKey]);

  // Load chapter detail + existing feedback when opening a chapter
  useEffect(() => {
    if (!activeStudent || !activeChapter) return;
    const load = async () => {
      try {
        const sKey = activeStudent.name.trim().toLowerCase().replace(/\s+/g,"_");
        const fbKey = supervisor.codeKey + "_fb_" + sKey + "_ch" + activeChapter;
        const res = await safeGet(fbKey);
        if (res && res.value) {
          const saved = JSON.parse(res.value);
          setFeedback(saved.feedback || "");
          setStatus(saved.status || "pending");
          setSectionComments(saved.sectionComments || {});
          setHighlights(saved.highlights || {});
        } else {
          setFeedback(""); setStatus("pending");
        }
        setFeedbackSaved(false);
        setAiSuggestion("");
        setAiSummary(""); setShowSummary(false);
        setSectionComments({});
        setHighlights({});
        // Check inline submissions first
        const cachedProf = SUP_CACHE[supervisor.codeKey];
        const inlineSub = cachedProf && cachedProf.submissions && cachedProf.submissions[activeStudent.name] && cachedProf.submissions[activeStudent.name][activeChapter];
        if (inlineSub) {
          setChapterData(inlineSub);
        } else {
          const subKey = supervisor.codeKey + "_sub_" + sKey + "_ch" + activeChapter;
          const sub = await safeGet(subKey);
          setChapterData(sub && sub.value ? JSON.parse(sub.value) : null);
        }
      } catch(e) {}
    };
    load();
  }, [activeStudent, activeChapter]);

  const saveFeedback = async () => {
    if (!activeStudent || !activeChapter) return;
    const sKey = activeStudent.name.trim().toLowerCase().replace(/\s+/g,"_");
    const chNum = parseInt(activeChapter);
    const reviewKey = activeStudent.name + "_" + chNum;

    // ── Step 1: Update UI IMMEDIATELY before any async work ──────────────────
    setReviewedKeys(prev => { const next = new Set(prev); next.add(reviewKey); return next; });
    setStudents(prev => prev.map(s => {
      if (s.name !== activeStudent.name) return s;
      return { ...s, feedbackStatus: { ...(s.feedbackStatus || {}), [chNum]: status || "reviewed" } };
    }));
    setFeedbackSaved(true);
    setTimeout(() => setFeedbackSaved(false), 2500);

    // ── Step 2: Persist to storage in background (non-blocking) ──────────────
    try {
      const payload = { feedback, status: status || "reviewed", sectionComments, highlights, supervisorName: supervisor.name, savedAt: new Date().toISOString() };
      const fbKey = supervisor.codeKey + "_fb_" + sKey + "_ch" + activeChapter;
      safeSet(fbKey, JSON.stringify(payload)); // fire-and-forget

      const prof = SUP_CACHE[supervisor.codeKey] || {};
      if (!prof.feedback) prof.feedback = {};
      if (!prof.feedback[activeStudent.name]) prof.feedback[activeStudent.name] = {};
      prof.feedback[activeStudent.name][chNum] = payload;
      if (!prof.reviewStatus) prof.reviewStatus = {};
      if (!prof.reviewStatus[activeStudent.name]) prof.reviewStatus[activeStudent.name] = {};
      prof.reviewStatus[activeStudent.name][chNum] = status || "reviewed";
      SUP_CACHE[supervisor.codeKey] = prof;
      safeSet(supervisor.codeKey, JSON.stringify(prof)); // fire-and-forget

      // Clear resubmit flag now that supervisor has reviewed this version
      try {
        const sKeyFb = activeStudent.name.trim().toLowerCase().replace(/\s+/g,"_");
        const resubFlagKey = supervisor.codeKey + "_resub_" + sKeyFb + "_ch" + chNum;
        safeDel(resubFlagKey);
      } catch(e) {}

      // Notify student
      const stuKey = activeStudent.name.trim().toLowerCase().replace(/\s+/g,"_");
      const statusMsg = status === "approved" ? "✅ Approved" : status === "minor" ? "⚠️ Minor revision needed" : status === "major" ? "🔴 Major revision needed" : "💬 Feedback received";
      pushNotification(stuKey, statusMsg + " — Chapter " + chNum + " feedback from your supervisor is ready.");

      // Notify supervisor themselves
      const supKey = supervisor.codeKey.replace(/[^a-z0-9]/gi,"_");
      pushNotification(supKey, "✓ Feedback saved for " + activeStudent.name + " — Chapter " + chNum + ".");
    } catch(e) { console.error("saveFeedback storage error:", e); }
  };

  const generateAiSummary = async () => {
    setSummaryLoading(true); setAiSummary(""); setShowSummary(true);
    if (!chapterData) { setSummaryLoading(false); return; }
    try {
      const chObj = CHAPTERS.find(c => c.num === activeChapter);
      const parts = [];
      if (chObj) {
        chObj.sections.forEach(function(s, i) {
          const comment = sectionComments[i] || "";
          const sectionHls = (highlights[i] || []);
          if (comment.trim() || sectionHls.length > 0) {
            parts.push("Section " + activeChapter + "." + (i+1) + " — " + s.name + ":");
            if (comment.trim()) parts.push("General comment: " + comment.trim());
            sectionHls.forEach(function(hl) {
              if (hl.comment && hl.comment.trim()) {
                parts.push("Highlighted: " + hl.text + " → " + hl.comment.trim());
              }
            });
          }
        });
      }
      if (feedback && feedback.trim()) parts.push("Overall: " + feedback.trim());
      if (parts.length === 0) { setAiSummary("No comments added yet. Add section comments or highlight text first."); setSummaryLoading(false); return; }
      const sys = "You are an expert academic writing coach summarizing supervisor feedback for a Nigerian undergraduate student. Be specific and actionable.";
      const prompt = "Supervisor reviewed Chapter " + activeChapter + " with these notes:\n\n" + parts.join("\n") + "\n\nProvide a response with these exact sections:\n\nCORRECTIONS NEEDED\n(bullet each specific correction)\n\nSUPERVISOR EXPECTATIONS\n(bullet what is expected in the revision)\n\nENCOURAGEMENT\n(two encouraging sentences)\n\nUnder 350 words.";
      const result = await callAI([{ role:"user", content:prompt }], sys);
      setAiSummary(result);
    } catch(e) { setAiSummary("Error: " + e.message); }
    setSummaryLoading(false);
  };

  const addHighlight = (sectionIdx, text, comment) => {
    if (!text || !text.trim()) return;
    const id = Date.now() + "_" + sectionIdx;
    setHighlights(prev => {
      const existing = prev[sectionIdx] || [];
      return { ...prev, [sectionIdx]: [...existing, { id, text: text.trim(), comment: comment || "" }] };
    });
    setFeedbackSaved(false);
  };

  const updateHighlightComment = (sectionIdx, id, comment) => {
    setHighlights(prev => {
      const existing = (prev[sectionIdx] || []).map(h => h.id === id ? { ...h, comment } : h);
      return { ...prev, [sectionIdx]: existing };
    });
    setFeedbackSaved(false);
  };

  const removeHighlight = (sectionIdx, id) => {
    setHighlights(prev => {
      const existing = (prev[sectionIdx] || []).filter(h => h.id !== id);
      return { ...prev, [sectionIdx]: existing };
    });
    setFeedbackSaved(false);
  };

  const handleTextSelection = (sectionIdx) => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) return;
    const selectedText = sel.toString().trim();
    if (selectedText.length < 3) return;
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    setActiveHighlight({ sectionIdx, selectedText, rect });
    setHlComment("");
  };

  const generateAiFeedback = async () => {
    if (!chapterData) return;
    setAiLoading(true); setAiSuggestion("");
    try {
      const chObj = CHAPTERS.find(c => c.num === activeChapter);
      const sectionsText = chObj ? chObj.sections.map((s, i) => s.name + ":\n" + (chapterData.drafts && chapterData.drafts[i] ? chapterData.drafts[i] : "(empty)")).join("\n\n") : "";
      const sys = "You are an experienced Nigerian university academic supervisor reviewing a final year project chapter. Be constructive, specific, and encouraging. Topic: " + chapterData.topic + ". Department: " + chapterData.dept + ".";
      const prompt = "Review this Chapter " + activeChapter + " submission from a final year student.\n\n" + sectionsText + "\n\nProvide structured supervisor feedback covering:\n1. Overall quality assessment (2 sentences)\n2. Strong points (2-3 specific observations)\n3. Areas requiring revision (2-3 specific points)\n4. Recommended action: Approve / Minor revision / Major revision\n\nBe direct but encouraging. Under 280 words.";
      const text = await callAI([{ role:"user", content:prompt }], sys);
      setAiSuggestion(text);
      setFeedback(text);
    } catch(e) { setAiSuggestion("Error: " + e.message); }
    setAiLoading(false);
  };

  const statusConfig = {
    pending:  { label:"Pending review",    color:"var(--grey3)",  bg:"rgba(255,255,255,0.06)",  border:"rgba(255,255,255,0.1)" },
    approved: { label:"Approved",          color:"#4CAF50",       bg:"rgba(76,175,80,0.1)",    border:"rgba(76,175,80,0.3)" },
    minor:    { label:"Minor revision",    color:"#FFC107",       bg:"rgba(255,193,7,0.1)",    border:"rgba(255,193,7,0.3)" },
    major:    { label:"Major revision",    color:"#FF7043",       bg:"rgba(255,112,67,0.1)",   border:"rgba(255,112,67,0.3)" },
  };

  const displayStudents = students;

  if (loading) return (
    <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ width:36, height:36, border:"3px solid rgba(0,201,167,0.2)", borderTop:"3px solid var(--teal)", borderRadius:"50%", animation:"spin 0.8s linear infinite", margin:"0 auto 14px" }} />
        <div style={{ fontSize:13, color:"var(--grey3)" }}>Loading students...</div>
      </div>
    </div>
  );

  // ── Chapter detail view ──────────────────────────────────────────────────
  if (view === "chapter" && activeStudent && activeChapter) {
    const chObj = CHAPTERS.find(c => c.num === activeChapter);
    const drafts = chapterData && chapterData.drafts ? chapterData.drafts : {};
    const wordCount = Object.values(drafts).join(" ").split(/\s+/).filter(Boolean).length;
    const sc = statusConfig[status] || statusConfig.pending;

    const saveAll = async () => { await saveFeedback(); };

    return (
      <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", flexDirection:"column", fontFamily:"var(--font-b)" }}>

        {/* Header */}
        <div style={{ padding:"12px 20px", borderBottom:"1px solid rgba(255,255,255,0.07)", display:"flex", alignItems:"center", gap:10, position:"sticky", top:0, background:"var(--navy)", zIndex:10, flexWrap:"wrap" }}>
          <button onClick={() => { setView("overview"); setActiveStudent(null); setActiveChapter(null); setChapterData(null); }}
            style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:7, padding:"6px 12px", color:"var(--grey3)", fontSize:12, cursor:"pointer", flexShrink:0 }}>
            ← Back
          </button>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
              <span style={{ fontFamily:"var(--font-d)", fontSize:14, fontWeight:700, color:"var(--white)" }}>{activeStudent.name} — Chapter {activeChapter}</span>
              <span style={{ background:"rgba(255,112,67,0.12)", border:"1px solid rgba(255,112,67,0.3)", borderRadius:20, padding:"2px 9px", fontSize:10, fontWeight:700, color:"#FF7043", flexShrink:0 }}>🔒 Locked</span>
            </div>
            <div style={{ fontSize:11, color:"var(--grey3)", marginTop:2 }}>{wordCount} words · Read-only submission</div>
          </div>
          <button onClick={saveAll}
            style={{ background: feedbackSaved ? "rgba(76,175,80,0.2)" : "var(--teal)", color: feedbackSaved ? "#4CAF50" : "var(--navy)", border: feedbackSaved ? "1px solid rgba(76,175,80,0.4)" : "none", borderRadius:8, padding:"7px 16px", fontFamily:"var(--font-d)", fontWeight:700, fontSize:13, cursor:"pointer", flexShrink:0 }}>
            {feedbackSaved ? "✓ Saved" : "Save all comments"}
          </button>
        </div>

        {/* Lock notice */}
        <div style={{ background:"rgba(255,112,67,0.06)", borderBottom:"1px solid rgba(255,112,67,0.15)", padding:"9px 20px", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
          <span style={{ fontSize:13 }}>🔒</span>
          <span style={{ fontSize:12, color:"#FF7043" }}>This chapter is locked for review. The student cannot edit it until you return it for revision.</span>
          {chapterData && chapterData.version && chapterData.version > 1 && (
            <span style={{ marginLeft:"auto", background:"rgba(255,193,7,0.15)", border:"1px solid rgba(255,193,7,0.3)", borderRadius:20, padding:"3px 10px", fontSize:10, fontWeight:700, color:"#FFC107" }}>
              🔄 Revision v{chapterData.version}
            </span>
          )}
        </div>

        {/* Status bar */}
        <div style={{ padding:"10px 20px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
          <span style={{ fontSize:11, color:"var(--grey3)", marginRight:4 }}>Chapter status:</span>
          {Object.entries(statusConfig).map(([key, cfg]) => (
            <button key={key} onClick={() => { setStatus(key); setFeedbackSaved(false); }}
              style={{ background: status===key ? cfg.bg : "transparent", border:"1px solid " + (status===key ? cfg.border : "rgba(255,255,255,0.08)"), borderRadius:20, padding:"4px 12px", cursor:"pointer" }}>
              <span style={{ fontSize:11, fontWeight:600, color: status===key ? cfg.color : "var(--grey3)" }}>{cfg.label}</span>
            </button>
          ))}
          <div style={{ marginLeft:"auto", display:"flex", gap:7, flexShrink:0 }}>
            <button onClick={generateAiSummary} disabled={summaryLoading}
              style={{ background:"rgba(255,193,7,0.1)", color:"#FFC107", border:"1px solid rgba(255,193,7,0.25)", borderRadius:20, padding:"4px 12px", fontFamily:"var(--font-d)", fontWeight:700, fontSize:11, cursor:"pointer" }}>
              {summaryLoading ? "Summarising..." : "✦ Summarise comments"}
            </button>
            <button onClick={generateAiFeedback} disabled={aiLoading}
              style={{ background:"rgba(0,201,167,0.08)", color:"var(--teal)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:20, padding:"4px 12px", fontFamily:"var(--font-d)", fontWeight:700, fontSize:11, cursor:"pointer" }}>
              {aiLoading ? "Generating..." : "✦ AI review"}
            </button>
          </div>
        </div>

        {/* Scrollable content */}
        <div style={{ flex:1, overflowY:"auto", padding:"20px 22px", maxWidth:780, width:"100%", margin:"0 auto" }}>

          {/* AI Summary of supervisor comments */}
          {showSummary && (
            <div style={{ background:"rgba(255,193,7,0.05)", border:"1px solid rgba(255,193,7,0.25)", borderRadius:12, padding:"16px 18px", marginBottom:20 }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                <div style={{ fontSize:10, fontWeight:700, color:"#FFC107", letterSpacing:"0.08em", textTransform:"uppercase" }}>✦ AI Summary of Your Comments</div>
                <button onClick={() => setShowSummary(false)} style={{ background:"transparent", border:"none", color:"var(--grey3)", cursor:"pointer", fontSize:14 }}>✕</button>
              </div>
              {summaryLoading ? (
                <div style={{ fontSize:12, color:"var(--grey3)", fontStyle:"italic" }}>Summarising your comments...</div>
              ) : (
                <div style={{ fontSize:12, color:"var(--grey2)", lineHeight:1.9, whiteSpace:"pre-wrap" }}>{aiSummary}</div>
              )}
            </div>
          )}

          {/* AI feedback banner */}
          {aiSuggestion && (
            <div style={{ background:"rgba(0,201,167,0.06)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:10, padding:"14px 16px", marginBottom:20 }}>
              <div style={{ fontSize:10, fontWeight:700, color:"var(--teal)", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:8 }}>AI Review Summary</div>
              <div style={{ fontSize:12, color:"var(--grey2)", lineHeight:1.8, whiteSpace:"pre-wrap" }}>{aiSuggestion}</div>
            </div>
          )}

          {/* Sections with inline comment boxes */}
          {chObj ? chObj.sections.map((s, i) => {
            const sectionComment = sectionComments[i] || "";
            const hasDraft = drafts[i] && drafts[i].trim().length > 0;
            return (
              <div key={i} style={{ marginBottom:28, background:"var(--navy2)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, overflow:"hidden" }}>

                {/* Section header */}
                <div style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.06)", display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontFamily:"var(--font-d)", fontSize:12, fontWeight:700, color:"var(--teal)" }}>{activeChapter}.{i+1}</span>
                  <span style={{ fontFamily:"var(--font-d)", fontSize:13, fontWeight:700, color:"var(--white)" }}>{s.name}</span>
                  <span style={{ fontSize:10, color: hasDraft ? "#4CAF50" : "var(--grey3)", marginLeft:"auto", fontWeight:600 }}>
                    {hasDraft ? drafts[i].split(/\s+/).filter(Boolean).length + " words" : "Not written"}
                  </span>
                  {sectionComment.trim() && (
                    <span style={{ background:"rgba(255,193,7,0.15)", border:"1px solid rgba(255,193,7,0.3)", borderRadius:10, padding:"2px 8px", fontSize:10, color:"#FFC107", fontWeight:600 }}>Commented</span>
                  )}
                </div>

                {/* Student text — read-only with highlight support */}
                <div style={{ padding:"14px 16px", borderBottom:"1px solid rgba(255,255,255,0.05)", position:"relative" }}>
                  {hasDraft ? (
                    <div
                      onMouseUp={() => handleTextSelection(i)}
                      style={{ fontSize:13, color:"var(--grey2)", lineHeight:1.9, whiteSpace:"pre-wrap", userSelect:"text", cursor:"text" }}>
                      {drafts[i]}
                    </div>
                  ) : (
                    <div style={{ fontSize:12, color:"var(--grey3)", fontStyle:"italic" }}>No content submitted for this section.</div>
                  )}
                  <div style={{ fontSize:10, color:"rgba(0,201,167,0.5)", marginTop:6, fontStyle:"italic" }}>
                    Select any text above to add a highlight comment
                  </div>
                </div>

                {/* Highlight popup */}
                {activeHighlight && activeHighlight.sectionIdx === i && (
                  <div style={{ margin:"0 16px 12px", background:"rgba(255,193,7,0.08)", border:"1px solid rgba(255,193,7,0.35)", borderRadius:10, padding:"12px 14px" }}>
                    <div style={{ fontSize:10, fontWeight:700, color:"#FFC107", marginBottom:6 }}>📌 COMMENTING ON: {activeHighlight.selectedText.slice(0,60)}{activeHighlight.selectedText.length > 60 ? "..." : ""}</div>
                    <textarea
                      value={hlComment}
                      onChange={e => setHlComment(e.target.value)}
                      placeholder="What needs to change about this? Be specific..."
                      rows={2}
                      autoFocus
                      style={{ width:"100%", background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,193,7,0.25)", borderRadius:7, padding:"8px 10px", color:"var(--white)", fontSize:12, fontFamily:"var(--font-b)", resize:"none", outline:"none", boxSizing:"border-box" }}
                    />
                    <div style={{ display:"flex", gap:8, marginTop:8 }}>
                      <button onClick={() => { addHighlight(i, activeHighlight.selectedText, hlComment); setActiveHighlight(null); setHlComment(""); window.getSelection().removeAllRanges(); }}
                        style={{ background:"#FFC107", color:"#000", border:"none", borderRadius:7, padding:"6px 14px", fontFamily:"var(--font-d)", fontWeight:700, fontSize:12, cursor:"pointer" }}>
                        Add comment
                      </button>
                      <button onClick={() => { setActiveHighlight(null); setHlComment(""); window.getSelection().removeAllRanges(); }}
                        style={{ background:"transparent", color:"var(--grey3)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:7, padding:"6px 14px", fontSize:12, cursor:"pointer" }}>
                        Cancel
                      </button>
                    </div>
                  </div>
                )}

                {/* Existing highlights for this section */}
                {(highlights[i] || []).length > 0 && (
                  <div style={{ margin:"0 16px 12px", display:"flex", flexDirection:"column", gap:7 }}>
                    <div style={{ fontSize:10, fontWeight:700, color:"#FFC107", letterSpacing:"0.08em" }}>📌 HIGHLIGHT COMMENTS</div>
                    {(highlights[i] || []).map(function(hl) {
                      return (
                        <div key={hl.id} style={{ background:"rgba(255,193,7,0.05)", border:"1px solid rgba(255,193,7,0.2)", borderRadius:8, padding:"10px 12px" }}>
                          <div style={{ fontSize:11, color:"rgba(255,193,7,0.8)", fontStyle:"italic", marginBottom:5 }}>{hl.text.slice(0,80)}{hl.text.length > 80 ? "..." : ""}</div>
                          <input
                            value={hl.comment}
                            onChange={e => updateHighlightComment(i, hl.id, e.target.value)}
                            placeholder="Add comment on this highlight..."
                            style={{ width:"100%", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,193,7,0.2)", borderRadius:6, padding:"6px 9px", color:"var(--white)", fontSize:12, fontFamily:"var(--font-b)", outline:"none", boxSizing:"border-box" }}
                          />
                          <button onClick={() => removeHighlight(i, hl.id)}
                            style={{ marginTop:6, background:"transparent", color:"rgba(255,112,67,0.7)", border:"none", fontSize:11, cursor:"pointer", padding:0 }}>
                            ✕ Remove
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Supervisor comment box */}
                <div style={{ padding:"12px 16px", background:"rgba(255,193,7,0.03)" }}>
                  <div style={{ fontSize:10, fontWeight:600, color:"#FFC107", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:7 }}>
                    💬 Supervisor comment on {activeChapter}.{i+1}
                  </div>
                  <textarea
                    value={sectionComment}
                    onChange={e => { setSectionComments(prev => ({ ...prev, [i]: e.target.value })); setFeedbackSaved(false); }}
                    placeholder={"Comment on this section... e.g. 'Expand the background context to include post-2020 data. The argument in paragraph 2 needs a citation.'"}
                    rows={3}
                    style={{ width:"100%", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,193,7,0.2)", borderRadius:8, padding:"10px 12px", color:"var(--white)", fontSize:12, fontFamily:"var(--font-b)", lineHeight:1.7, resize:"vertical", outline:"none", boxSizing:"border-box" }}
                    onFocus={e => { e.target.style.borderColor="rgba(255,193,7,0.5)"; }}
                    onBlur={e => { e.target.style.borderColor="rgba(255,193,7,0.2)"; }}
                  />
                  {sectionComment.trim() && (
                    <div style={{ fontSize:10, color:"var(--grey3)", marginTop:4, textAlign:"right" }}>
                      {sectionComment.trim().split(/\s+/).length} words
                    </div>
                  )}
                </div>
              </div>
            );
          }) : <div style={{ color:"var(--grey3)", fontSize:13 }}>Chapter data unavailable.</div>}

          {/* Overall feedback */}
          <div style={{ marginTop:8, background:"var(--navy2)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, overflow:"hidden" }}>
            <div style={{ padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
              <div style={{ fontSize:10, fontWeight:700, color:"var(--teal)", letterSpacing:"0.08em", textTransform:"uppercase" }}>Overall feedback to student</div>
            </div>
            <div style={{ padding:"14px 16px" }}>
              <textarea
                value={feedback}
                onChange={e => { setFeedback(e.target.value); setFeedbackSaved(false); }}
                placeholder={"Write your overall feedback for Chapter " + activeChapter + " here..."}
                rows={5}
                style={{ width:"100%", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:8, padding:"10px 12px", color:"var(--white)", fontSize:13, fontFamily:"var(--font-b)", lineHeight:1.8, resize:"vertical", outline:"none", boxSizing:"border-box" }}
                onFocus={e => { e.target.style.borderColor="rgba(0,201,167,0.3)"; }}
                onBlur={e => { e.target.style.borderColor="rgba(255,255,255,0.08)"; }}
              />
            </div>
          </div>

          <button onClick={saveAll} style={{ width:"100%", marginTop:16, marginBottom:24, background: feedbackSaved ? "rgba(76,175,80,0.15)" : "var(--teal)", color: feedbackSaved ? "#4CAF50" : "var(--navy)", border: feedbackSaved ? "1px solid rgba(76,175,80,0.4)" : "none", borderRadius:10, padding:"14px", fontFamily:"var(--font-d)", fontWeight:700, fontSize:15, cursor:"pointer" }}>
            {feedbackSaved ? "✓ All comments saved" : "Save all comments →"}
          </button>

          {/* Revision history for supervisor */}
          {activeStudent && activeChapter && (
            <div style={{ marginBottom:32 }}>
              <RevisionHistory
                project={{ supervisorCodeKey: supervisor.codeKey, studentName: activeStudent.name }}
                chapterNum={activeChapter}
              />
            </div>
          )}
        </div>
      </div>
    );
  }


  // ── Overview Dashboard ───────────────────────────────────────────────────
  if (view === "overview") {
    const totalStudents   = students.length;
    const totalSubmitted  = students.reduce((a, s) => a + Object.keys(s.submittedChapters || {}).length, 0);
    const pendingReview = students.reduce((a, s) =>
      a + Object.keys(s.submittedChapters || {}).filter(chNum =>
        !reviewedKeys.has(s.name + "_" + parseInt(chNum))
      ).length, 0);
    const activeStudents  = students.filter(s => Object.keys(s.submittedChapters || {}).length > 0);
    const card = { background:"var(--navy2)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, padding:"18px 20px" };
    const statusColor = { pending:"var(--grey3)", approved:"#4CAF50", minor:"#FFC107", major:"#FF7043" };

    // reviewQueue — only chapters NOT yet reviewed
    // Uses reviewedKeys Set which updates the instant supervisor saves feedback
    const reviewQueue = [];
    students.forEach(s => {
      Object.keys(s.submittedChapters || {}).forEach(chNum => {
        const n = parseInt(chNum);
        if (!reviewedKeys.has(s.name + "_" + n)) {
          reviewQueue.push({ student: s, chNum: n });
        }
      });
    });

    return (
      <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", flexDirection:"column", fontFamily:"var(--font-b)" }}>

        {/* Nav */}
        <div className="rp-nav">
          <div>
            <ProjectaIcon size={30} />
            <div style={{ fontSize:11, color:"var(--grey3)" }}>Supervisor · {(supervisor.title ? supervisor.title + " " : "") + supervisor.name}</div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={() => setView("list")}
              style={{ background:"rgba(0,201,167,0.08)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:8, padding:"6px 13px", color:"var(--teal)", fontSize:12, cursor:"pointer", fontWeight:600 }}>
              All students
            </button>
            <button onClick={() => loadStudents(true)} disabled={refreshing}
              style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"6px 13px", color: refreshing ? "var(--grey3)" : "var(--grey2)", fontSize:12, cursor:"pointer" }}>
              {refreshing ? "Refreshing..." : "↻ Refresh"}
            </button>
            <NotificationBell userKey={(supervisor && supervisor.code) ? supervisor.code : "supervisor"} />
            <button onClick={onBack}
              style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"6px 13px", color:"var(--grey3)", fontSize:12, cursor:"pointer" }}>
              Sign out
            </button>
          </div>
        </div>

        <div style={{ flex:1, overflowY:"auto", padding:"26px 0 40px" }}><div className="rp-container">

          {/* Greeting */}
          <div style={{ marginBottom:24 }} className="fu">
            <div style={{ fontSize:11, fontWeight:600, color:"var(--teal)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>
              {supervisor.dept} · {supervisor.uni}
            </div>
            <div style={{ fontFamily:"var(--font-d)", fontSize:24, fontWeight:800, color:"var(--white)", letterSpacing:"-0.5px", lineHeight:1.25, marginBottom:6 }}>
              {"Welcome back, " + (supervisor.title ? supervisor.title + " " : "") + supervisor.name.split(" ").slice(-1)[0] + "."}
            </div>
            <div style={{ fontSize:13, color:"var(--grey3)" }}>Here is your supervision overview.</div>
          </div>

          {/* Stats row */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:16 }} className="fu">
            {[
              { icon:"👥", val: totalStudents,  label:"Students",          sub:"connected" },
              { icon:"📤", val: totalSubmitted, label:"Chapters submitted", sub:"awaiting review" },
              { icon:"✅", val: activeStudents.length, label:"Active students", sub:"have submitted work" },
            ].map((s, i) => (
              <div key={i} style={{ ...card, textAlign:"center", padding:"16px 8px" }}>
                <div style={{ fontSize:20, marginBottom:6 }}>{s.icon}</div>
                <div style={{ fontFamily:"var(--font-d)", fontSize:26, fontWeight:800, color:"var(--teal)", lineHeight:1, marginBottom:4 }}>{s.val}</div>
                <div style={{ fontSize:11, fontWeight:600, color:"var(--white)", marginBottom:2 }}>{s.label}</div>
                <div style={{ fontSize:10, color:"var(--grey3)" }}>{s.sub}</div>
              </div>
            ))}
          </div>

          {/* Supervisor code card */}
          <div style={{ ...card, background:"rgba(0,201,167,0.05)", border:"1px solid rgba(0,201,167,0.2)", marginBottom:16 }} className="fu">
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12 }}>
              <div>
                <div style={{ fontSize:10, fontWeight:600, color:"var(--teal)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>Your Supervisor Code</div>
                <div style={{ fontFamily:"var(--font-d)", fontSize:34, fontWeight:800, color:"var(--white)", letterSpacing:"6px", lineHeight:1 }}>{supervisor.code}</div>
                <div style={{ fontSize:11, color:"var(--grey3)", marginTop:6 }}>Students enter this code during project setup to connect to you.</div>
              </div>
              <button
                onClick={() => { try { navigator.clipboard && navigator.clipboard.writeText(supervisor.code); } catch(e) {} }}
                style={{ background:"rgba(0,201,167,0.12)", border:"1px solid rgba(0,201,167,0.3)", borderRadius:9, padding:"9px 16px", color:"var(--teal)", fontFamily:"var(--font-d)", fontWeight:700, fontSize:12, cursor:"pointer", flexShrink:0 }}
                onMouseEnter={e => { e.currentTarget.style.background = "rgba(0,201,167,0.22)"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "rgba(0,201,167,0.12)"; }}>
                Copy code
              </button>
            </div>
          </div>

          {/* Review queue */}
          <div style={{ ...card, marginBottom:16 }} className="fu">
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
              <div style={{ fontSize:10, fontWeight:600, color:"var(--grey3)", letterSpacing:"0.1em", textTransform:"uppercase" }}>
                Review Queue
              </div>
              {reviewQueue.length > 0 && (
                <div style={{ background:"rgba(255,193,7,0.12)", border:"1px solid rgba(255,193,7,0.3)", borderRadius:20, padding:"2px 10px", fontSize:10, fontWeight:700, color:"#FFC107" }}>
                  {reviewQueue.length} pending
                </div>
              )}
            </div>
            {reviewQueue.length === 0 ? (
              <div style={{ textAlign:"center", padding:"20px 0" }}>
                <div style={{ fontSize:24, marginBottom:8 }}>✓</div>
                <div style={{ fontSize:13, color:"var(--grey3)" }}>No pending submissions right now.</div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {reviewQueue.slice(0, 5).map((item, i) => {
                  const ch = CHAPTERS.find(c => c.num === item.chNum);
                  const subCount = Object.keys(item.student.submittedChapters || {}).length;
                  return (
                    <div key={i}
                      onClick={() => { setActiveStudent(item.student); setActiveChapter(item.chNum); setView("chapter"); }}
                      style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"12px 14px", cursor:"pointer", transition:"all 0.15s" }}
                      onMouseEnter={e => { e.currentTarget.style.background = "rgba(0,201,167,0.06)"; e.currentTarget.style.borderColor = "rgba(0,201,167,0.25)"; }}
                      onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.03)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.07)"; }}>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:13, fontWeight:600, color:"var(--white)", marginBottom:2 }}>{item.student.name}</div>
                        <div style={{ fontSize:11, color:"var(--grey3)" }}>
                          {"Chapter " + item.chNum + (ch ? ": " + ch.title : "")}
                        </div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                        <span style={{ background:"rgba(255,193,7,0.12)", border:"1px solid rgba(255,193,7,0.25)", borderRadius:6, padding:"3px 8px", fontSize:10, fontWeight:600, color:"#FFC107" }}>
                          Review →
                        </span>
                      </div>
                    </div>
                  );
                })}
                {reviewQueue.length > 5 && (
                  <button onClick={() => setView("list")}
                    style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.08)", borderRadius:9, padding:"9px", color:"var(--grey3)", fontSize:12, cursor:"pointer", fontFamily:"var(--font-d)", fontWeight:600 }}>
                    {"+ " + (reviewQueue.length - 5) + " more — view all students"}
                  </button>
                )}
              </div>
            )}
          </div>

          {/* Student progress overview */}
          {students.length > 0 && (
            <div style={{ ...card, marginBottom:16 }} className="fu">
              <div style={{ fontSize:10, fontWeight:600, color:"var(--grey3)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:14 }}>
                Student Progress
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {students.map((s, i) => {
                  const subCount = Object.keys(s.submittedChapters || {}).length;
                  const pct = Math.round((subCount / 5) * 100);
                  return (
                    <div key={i}
                      onClick={() => setView("list")}
                      style={{ cursor:"pointer" }}>
                      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5 }}>
                        <div>
                          <span style={{ fontSize:12, fontWeight:600, color:"var(--white)", marginRight:8 }}>{s.name}</span>
                          <span style={{ fontSize:11, color:"var(--grey3)" }}>{s.dept}</span>
                        </div>
                        <span style={{ fontSize:11, fontWeight:700, color: subCount > 0 ? "var(--teal)" : "var(--grey3)" }}>{subCount}/5</span>
                      </div>
                      <div style={{ background:"rgba(255,255,255,0.06)", borderRadius:999, height:6, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:pct + "%", background: pct === 100 ? "#4CAF50" : "linear-gradient(90deg, #007A65, #00C9A7)", borderRadius:999, transition:"width 0.5s" }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Empty state — no students yet */}
          {students.length === 0 && !loading && (
            <div style={{ ...card, textAlign:"center", padding:"28px 20px" }} className="fu">
              <div style={{ fontSize:32, marginBottom:10 }}>👋</div>
              <div style={{ fontFamily:"var(--font-d)", fontSize:16, fontWeight:700, color:"var(--white)", marginBottom:6 }}>No students yet</div>
              <div style={{ fontSize:13, color:"var(--grey3)", lineHeight:1.7, marginBottom:16 }}>
                Share your code with your students. They enter it during project setup to connect to you.
              </div>
              <div style={{ background:"rgba(0,0,0,0.3)", border:"2px solid rgba(0,201,167,0.35)", borderRadius:10, padding:"12px 20px", fontFamily:"var(--font-d)", fontSize:32, fontWeight:800, color:"var(--white)", letterSpacing:"6px", display:"inline-block" }}>
                {supervisor.code}
              </div>
            </div>
          )}

          {/* Quick actions */}
          <div style={{ ...card }} className="fu">
            <div style={{ fontSize:10, fontWeight:600, color:"var(--grey3)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:12 }}>Quick Actions</div>
            <div className="rp-grid-4" style={{ display:"grid", gap:8 }}>
              {[
                { icon:"👥", label:"All students",    sub:"View full student list",         fn: () => setView("list") },
                { icon:"📋", label:"Review queue",    sub: reviewQueue.length + " pending", fn: () => setView("list") },
                { icon:"↻",  label:"Refresh data",   sub:"Check for new submissions",      fn: () => loadStudents(true) },
                { icon:"🔑", label:"Your code",       sub: supervisor.code,                 fn: () => { try { navigator.clipboard && navigator.clipboard.writeText(supervisor.code); } catch(e) {} } },
              ].map((a, i) => (
                <button key={i} onClick={a.fn}
                  style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:10, padding:"12px 14px", cursor:"pointer", textAlign:"left", transition:"all 0.15s" }}
                  onMouseEnter={e => { e.currentTarget.style.background = "rgba(0,201,167,0.06)"; e.currentTarget.style.borderColor = "rgba(0,201,167,0.25)"; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.03)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.07)"; }}>
                  <div style={{ fontSize:18, marginBottom:5 }}>{a.icon}</div>
                  <div style={{ fontSize:12, fontWeight:700, color:"var(--white)", marginBottom:2 }}>{a.label}</div>
                  <div style={{ fontSize:11, color:"var(--grey3)", lineHeight:1.4 }}>{a.sub}</div>
                </button>
              ))}
            </div>
          </div>

        </div></div>
      </div>
    );
  }

  // ── Student list view ─────────────────────────────────────────────────────
  return (
    <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", flexDirection:"column", fontFamily:"var(--font-b)" }}>
      {/* Header */}
      <div className="rp-nav">
        <div>
          <ProjectaIcon size={30} />
          <div style={{ fontSize:11, color:"var(--grey3)" }}>Supervisor · {(supervisor.title ? supervisor.title + " " : "") + supervisor.name}</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <button onClick={() => setView("overview")}
            style={{ background:"rgba(0,201,167,0.08)", border:"1px solid rgba(0,201,167,0.2)", borderRadius:8, padding:"7px 13px", color:"var(--teal)", fontSize:12, cursor:"pointer", fontWeight:600 }}>
            ← Overview
          </button>
          <button onClick={() => loadStudents(true)} disabled={refreshing}
            style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"7px 13px", color: refreshing ? "var(--grey3)" : "var(--grey2)", fontSize:12, cursor:"pointer" }}>
            {refreshing ? "..." : "↻ Refresh"}
          </button>
          <button onClick={onBack}
            style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, padding:"7px 13px", color:"var(--grey3)", fontSize:12, cursor:"pointer" }}>
            Sign out
          </button>
        </div>
      </div>

      <div style={{ flex:1, padding:"24px 22px", maxWidth:700, margin:"0 auto", width:"100%" }}>
        {/* Stats bar */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:28 }} className="fu">
          {[
            { label:"Students",           value: displayStudents.length },
            { label:"Chapters submitted", value: displayStudents.reduce((a, s) => a + Object.keys(s.submittedChapters||{}).length, 0) },
            { label:"Pending review",     value: displayStudents.reduce((a, s) => a + Object.keys(s.submittedChapters||{}).length, 0) },
          ].map((stat, i) => (
            <div key={i} style={{ background:"var(--navy2)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:12, padding:"14px 16px" }}>
              <div style={{ fontFamily:"var(--font-d)", fontSize:26, fontWeight:800, color:"var(--teal)", marginBottom:2 }}>{stat.value}</div>
              <div style={{ fontSize:11, color:"var(--grey3)" }}>{stat.label}</div>
            </div>
          ))}
        </div>

        {/* Section label */}
        <div style={{ fontSize:10, fontWeight:600, color:"var(--grey3)", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:14 }}>
          Your Students — {supervisor.dept} · {supervisor.uni}
        </div>

        {/* Student cards */}
        <div className="rp-students-grid" style={{ display:"grid", gridTemplateColumns:"1fr", gap:12 }}>
          {displayStudents.map((s, si) => {
            const subCount = Object.keys(s.submittedChapters || {}).length;
            return (
              <div key={si} className="fu" style={{ animationDelay: (si * 0.06) + "s" }}>
                <div style={{ background:"var(--navy2)", border:"1px solid rgba(255,255,255,0.07)", borderRadius:14, padding:"18px 20px" }}>
                  {/* Student header */}
                  <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12, marginBottom:14 }}>
                    <div>
                      <div style={{ fontFamily:"var(--font-d)", fontSize:15, fontWeight:700, color:"var(--white)", marginBottom:3 }}>{s.name}</div>
                      <div style={{ fontSize:12, color:"var(--grey3)", lineHeight:1.5 }}>{s.topic}</div>
                      <div style={{ fontSize:11, color:"var(--grey3)", marginTop:3 }}>{s.dept} · {s.uni}</div>
                    </div>
                    <div style={{ flexShrink:0, textAlign:"right" }}>
                      <div style={{ fontFamily:"var(--font-d)", fontSize:20, fontWeight:800, color: subCount > 0 ? "var(--teal)" : "var(--grey3)" }}>{subCount}/5</div>
                      <div style={{ fontSize:10, color:"var(--grey3)" }}>submitted</div>
                    </div>
                  </div>

                  {/* Chapter pills */}
                  <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                    {[1,2,3,4,5].map(n => {
                      const hasSub = s.submittedChapters && s.submittedChapters[n];
                      const fbStatus = s.feedbackStatus && s.feedbackStatus[n];
                      // Color based on review status
                      const pillColor = !hasSub ? "var(--grey3)"
                        : fbStatus === "approved" ? "#4CAF50"
                        : fbStatus === "minor" ? "#FFC107"
                        : fbStatus === "major" ? "#FF7043"
                        : fbStatus ? "var(--teal)"
                        : "var(--teal)";
                      const pillBg = !hasSub ? "rgba(255,255,255,0.03)"
                        : fbStatus === "approved" ? "rgba(76,175,80,0.12)"
                        : fbStatus === "minor" ? "rgba(255,193,7,0.12)"
                        : fbStatus === "major" ? "rgba(255,112,67,0.12)"
                        : "rgba(0,201,167,0.1)";
                      const pillBorder = !hasSub ? "rgba(255,255,255,0.08)"
                        : fbStatus === "approved" ? "rgba(76,175,80,0.35)"
                        : fbStatus === "minor" ? "rgba(255,193,7,0.35)"
                        : fbStatus === "major" ? "rgba(255,112,67,0.35)"
                        : "rgba(0,201,167,0.3)";
                      const pillLabel = !hasSub ? "Ch." + n
                        : fbStatus === "approved" ? "Ch." + n + " ✓"
                        : fbStatus === "minor" ? "Ch." + n + " ~"
                        : fbStatus === "major" ? "Ch." + n + " !"
                        : fbStatus === "pending" ? "Ch." + n + " 🔄"
                        : fbStatus ? "Ch." + n + " ✓"
                        : "Ch." + n + " ●";
                      return (
                        <button key={n}
                          onClick={() => { if (hasSub) { setActiveStudent(s); setActiveChapter(n); setView("chapter"); } }}
                          style={{ background: pillBg, border:"1px solid " + pillBorder, borderRadius:8, padding:"7px 12px", cursor: hasSub ? "pointer" : "default", fontFamily:"var(--font-d)", fontWeight:600, fontSize:12, color: pillColor }}
                          onMouseEnter={e => { if (hasSub) { e.currentTarget.style.opacity = "0.8"; } }}
                          onMouseLeave={e => { if (hasSub) { e.currentTarget.style.opacity = "1"; } }}
                          title={!hasSub ? "Not submitted" : fbStatus ? fbStatus : "Submitted — awaiting review"}>
                          {pillLabel}
                        </button>
                      );
                    })}
                  </div>
                  {/* Legend */}
                  {Object.keys(s.feedbackStatus || {}).length > 0 && (
                    <div style={{ display:"flex", gap:10, marginTop:6, flexWrap:"wrap" }}>
                      <span style={{ fontSize:10, color:"var(--grey3)" }}>● Pending</span>
                      <span style={{ fontSize:10, color:"#4CAF50" }}>✓ Approved</span>
                      <span style={{ fontSize:10, color:"#FFC107" }}>~ Minor revision</span>
                      {(s.feedbackStatus[parseInt(chNum)] === "pending") && (
                        <span style={{ fontSize:10, color:"var(--teal)", fontWeight:700 }}>🔄 Resubmitted</span>
                      )}
                      <span style={{ fontSize:10, color:"#FF7043" }}>! Major revision</span>
                    </div>
                  )}

                  {subCount === 0 && (
                    <div style={{ marginTop:12, fontSize:12, color:"var(--grey3)", fontStyle:"italic" }}>No chapters submitted yet.</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        {displayStudents.length === 0 && !loading && (
          <div style={{ marginTop:8, padding:16, background:"rgba(0,201,167,0.05)", border:"1px solid rgba(0,201,167,0.12)", borderRadius:12, fontSize:13, color:"var(--grey3)", lineHeight:1.8, marginBottom:16 }}>
            <div style={{ fontWeight:700, color:"var(--teal)", marginBottom:8 }}>No students connected yet</div>
            <div style={{ marginBottom:8 }}>Tell your students to enter this name exactly in the <strong style={{ color:"var(--white)" }}>Supervisor Name</strong> field when setting up their project:</div>
            <div style={{ background:"rgba(0,0,0,0.3)", border:"2px solid rgba(0,201,167,0.4)", borderRadius:10, padding:"14px 18px", fontFamily:"var(--font-d)", fontSize:36, fontWeight:800, color:"var(--white)", letterSpacing:"6px", textAlign:"center", marginBottom:8 }}>{supervisor.code}</div>
            <div style={{ fontSize:11 }}>Share this code with your students. They enter it during project setup. Then hit ↻ Refresh.</div>
          </div>
        )}

      </div>
    </div>
  );
}


function App() {
  const [role,        setRole]        = useState(null);  // null | "student" | "supervisor"
  const [supervisor,  setSupervisor]  = useState(null);
  const [screen,      setScreen]      = useState("loading");
  const [project,     setProject]     = useState(null);
  const [chapter,     setChapter]     = useState(null);
  const [allDrafts,   setAllDrafts]   = useState({});
  const [viewChapter, setViewChapter] = useState(null);
  const [viewChapterFeedback, setViewChapterFeedback] = useState(null);
  const [savedProject, setSavedProject] = useState(null);
  const [studentEmail,  setStudentEmail]  = useState(null);

  // ── Load everything from storage on first mount ──────────────────────────
  useEffect(() => {
    const load = async () => {
      // Always start from the login/sign up page — no auto session restore
      setScreen("auth");
    };
    load();
  }, []);

  // ── Save everything to storage whenever project or drafts change ─────────
  useEffect(() => {
    if (!project) return;
    try {
      const key = studentEmail ? STORAGE_KEY + "_" + studentEmail : STORAGE_KEY;
      safeSet(key, JSON.stringify({ project, drafts: allDrafts }));
    } catch(e) {}
  }, [project, allDrafts, studentEmail]);

  const handleContinue = () => {
    setProject(savedProject);
    setScreen("chapters");
  };

  const handleClear = async () => {
    try {
      const key = studentEmail ? STORAGE_KEY + "_" + studentEmail : STORAGE_KEY;
      await safeDel(key);
    } catch(e) {}
    setSavedProject(null);
    setProject(null);
    setAllDrafts({});
    setScreen("setup");
  };

  const handleNewProject = async (info) => {
    let supProfile = null;
    let codeKey = null;

    if (info.supervisorCode) {
      codeKey = "sup_code_" + info.supervisorCode.replace("-","");
      // 1. Check in-memory cache first (supervisor logged in same session)
      if (SUP_CACHE[codeKey]) {
        supProfile = SUP_CACHE[codeKey];
        console.log("Supervisor found in cache:", supProfile.name);
      } else {
        // 2. Fall back to storage
        try {
          if (window.storage) {
            const r = await safeGet(codeKey);
            if (r && r.value) { supProfile = JSON.parse(r.value); console.log("Supervisor found in storage:", supProfile.name); }
          }
        } catch(e) { console.warn("Storage lookup failed:", e.message); }
      }
    }

    const p = { ...info, completed:0, submitted:{},
      supervisorName: supProfile ? supProfile.name : ("Code: " + (info.supervisorCode || "?")),
      supervisorCodeKey: codeKey
    };
    setProject(p);
    setSavedProject(p);
    setAllDrafts({});

    // Register student in supervisor profile — write to BOTH localStorage and Firestore
    if (codeKey) {
      const prof = SUP_CACHE[codeKey] || supProfile || { name: p.supervisorName, code: info.supervisorCode, students: [], submissions: {} };
      const students = prof.students || [];
      const filtered = students.filter(s => s.studentName !== info.studentName);
      filtered.push({ studentName: info.studentName, topic: info.topic, dept: info.dept, uni: info.uni, email: studentEmail || "" });
      prof.students = filtered;
      if (!prof.submissions) prof.submissions = {};
      SUP_CACHE[codeKey] = prof;
      const profStr = JSON.stringify(prof);
      // Write localStorage immediately
      try { localStorage.setItem("pjt_" + codeKey, profStr); } catch(e) {}
      // Write Firestore and WAIT for it (with timeout) so supervisor sees student
      try {
        if (window._db) {
          await withTimeout(
            window._db.collection("pjt").doc(codeKey).set({ v: profStr, t: Date.now() }),
            8000
          );
        }
      } catch(e) { console.warn("Firestore sync warning:", e.message); }
      console.log("Student registered:", info.studentName, "under", codeKey);
    }
    setScreen("dashboard");
  };

  const handleComplete = async (num, draftsForChapter) => {
    const p = project;
    setProject(prev => {
      const updated = { ...prev, completed: Math.max(prev.completed||0, num), submitted: { ...(prev.submitted||{}), [num]: true } };
      setSavedProject(updated);
      return updated;
    });
    if (p && p.supervisorCodeKey && p.studentName) {
      // Load existing submissions to determine version number
      const sKey2 = p.studentName.trim().toLowerCase().replace(/\s+/g,"_").slice(0,12);
      const supCode = p.supervisorCodeKey.replace("sup_code_","").replace(/[^a-z0-9]/gi,"");
      const histKey = "hist_" + supCode + "_" + sKey2 + "_ch" + num;
      let version = 1;
      try {
        const existing = await safeGet(histKey);
        if (existing && existing.value) {
          const hist = JSON.parse(existing.value);
          version = (hist.length || 0) + 1;
        }
      } catch(e) {}

      const subPayload = {
        drafts: draftsForChapter || {},
        topic: p.topic, dept: p.dept, uni: p.uni,
        studentName: p.studentName, submittedAt: new Date().toISOString(),
        version
      };

      // Save to revision history (shared storage so supervisor can read cross-device)
      try {
        const existing = await safeGet(histKey);
        const hist = existing && existing.value ? JSON.parse(existing.value) : [];
        hist.push({ version, drafts: draftsForChapter || {}, submittedAt: subPayload.submittedAt });
        await safeSet(histKey, JSON.stringify(hist));
        // Also cache in SUP_CACHE for same-session supervisor access
        const prof2 = SUP_CACHE[p.supervisorCodeKey];
        if (prof2) {
          if (!prof2.revHistory) prof2.revHistory = {};
          if (!prof2.revHistory[p.studentName]) prof2.revHistory[p.studentName] = {};
          prof2.revHistory[p.studentName][num] = hist;
        }
      } catch(e) {}
      // Write into SUP_CACHE directly — supervisor reads same object
      const prof = SUP_CACHE[p.supervisorCodeKey];
      if (prof) {
        if (!prof.submissions) prof.submissions = {};
        if (!prof.submissions[p.studentName]) prof.submissions[p.studentName] = {};
        prof.submissions[p.studentName][num] = subPayload;
        // Clear reviewStatus so this chapter re-enters the supervisor queue
        if (version > 1) {
          if (prof.reviewStatus && prof.reviewStatus[p.studentName]) {
            delete prof.reviewStatus[p.studentName][num];
          }
        }
        console.log("Chapter written to cache:", p.supervisorCodeKey, p.studentName, "ch" + num, "v" + version);
      }
      // Also persist to storage as backup
      const sKey = p.studentName.trim().toLowerCase().replace(/\s+/g,"_");
      const subKey = p.supervisorCodeKey + "_sub_" + sKey + "_ch" + num;
      safeSet(subKey, JSON.stringify(subPayload));
      // On resubmit: write a dedicated resubmit flag and reset feedback status
      if (version > 1) {
        const fbKey = p.supervisorCodeKey + "_fb_" + sKey + "_ch" + num;
        const resubFlagKey = p.supervisorCodeKey + "_resub_" + sKey + "_ch" + num;
        const resubFlag = { version, resubmittedAt: new Date().toISOString(), studentName: p.studentName };
        // Write resubmit flag to shared storage — supervisor reads this
        safeSet(resubFlagKey, JSON.stringify(resubFlag));
        // Also reset the feedback status to pending in shared storage
        const oldFb = await safeGet(fbKey);
        if (oldFb && oldFb.value) {
          try {
            const oldFbParsed = JSON.parse(oldFb.value);
            oldFbParsed.archivedStatus = oldFbParsed.archivedStatus || oldFbParsed.status;
            oldFbParsed.status = "pending";
            oldFbParsed.resubmittedAt = resubFlag.resubmittedAt;
            oldFbParsed.resubmitVersion = version;
            await safeSet(fbKey, JSON.stringify(oldFbParsed));
            if (prof && prof.feedback && prof.feedback[p.studentName] && prof.feedback[p.studentName][num]) {
              prof.feedback[p.studentName][num] = oldFbParsed;
            }
            if (prof && prof.reviewStatus && prof.reviewStatus[p.studentName]) {
              prof.reviewStatus[p.studentName][num] = "pending";
            }
          } catch(e) {}
        }
      }
      // Re-persist the whole profile with submissions
      if (prof) safeSet(p.supervisorCodeKey, JSON.stringify(prof));

      // Notify supervisor
      const supKey = p.supervisorCodeKey.replace(/[^a-z0-9]/gi,"_");
      const submitMsg = version > 1
        ? "🔄 " + p.studentName + " resubmitted Chapter " + num + " (v" + version + ") — ready for re-review."
        : "📥 " + p.studentName + " submitted Chapter " + num + " for review.";
      pushNotification(supKey, submitMsg);

      // Notify student themselves
      const stuKey = (p.studentName || "").trim().toLowerCase().replace(/\s+/g,"_");
      const stuMsg = version > 1
        ? "🔄 Chapter " + num + " revision (v" + version + ") submitted to your supervisor."
        : "✅ Chapter " + num + " submitted to your supervisor successfully.";
      pushNotification(stuKey, stuMsg);
    }
  };

  if (screen === "loading") {
    return (
      <div style={{ minHeight:"100vh", background:"var(--navy)", display:"flex", alignItems:"center", justifyContent:"center" }}>
        <div style={{ textAlign:"center" }}>
          <div style={{ width:40, height:40, border:"3px solid rgba(0,201,167,0.2)", borderTop:"3px solid var(--teal)", borderRadius:"50%", animation:"spin 0.8s linear infinite", margin:"0 auto 16px" }} />
          <div style={{ fontFamily:"var(--font-d)", fontSize:14, color:"var(--grey3)" }}>Loading your project...</div>
        </div>
      </div>
    );
  }

  const handleLogin = async (acc) => {
    // acc = { email, role, name, dept, uni, code?, codeKey? }
    setRole(acc.role);
    if (acc.role === "supervisor") {
      const sup = { name: acc.name, dept: acc.dept, uni: acc.uni, code: acc.code, codeKey: acc.codeKey, title: acc.title || "" };
      setSupervisor(sup);
      // Restore SUP_CACHE if not already present
      if (acc.codeKey && !SUP_CACHE[acc.codeKey]) {
        const r = await safeGet(acc.codeKey);
        if (r && r.value) SUP_CACHE[acc.codeKey] = JSON.parse(r.value);
        else SUP_CACHE[acc.codeKey] = { name: acc.name, dept: acc.dept, uni: acc.uni, code: acc.code, students: [] };
      }
      await safeSet(ROLE_KEY, JSON.stringify({ role:"supervisor", supervisor:{ name:acc.name, dept:acc.dept, uni:acc.uni, code:acc.code, codeKey:acc.codeKey, email:acc.email, title:acc.title } }));
      setScreen("supervisor_dashboard");
    } else {
      // Student — load their saved project
      const res = await safeGet(STORAGE_KEY + "_" + acc.email);
      if (res && res.value) {
        const saved = JSON.parse(res.value);
        setSavedProject(saved.project || null);
        setAllDrafts(saved.drafts || {});
        setProject(saved.project || null);
        setScreen(saved.project ? "dashboard" : "setup");
      } else {
        setScreen("setup");
      }
      await safeSet(ROLE_KEY, JSON.stringify({ role:"student", email:acc.email, name:acc.name, account:acc }));
      setStudentEmail(acc.email);
    }
  };

  const handleSupervisorSignOut = () => {
    setRole(null);
    setSupervisor(null);
    setScreen("auth");
  };

  const handleSwitchAccount = async () => {
    await safeDel(ROLE_KEY);
    setSupervisor(null);
    setRole(null);
    setScreen("auth");
  };

  const handleSignOut = async () => {
    await safeDel(ROLE_KEY);
    setRole(null); setSupervisor(null); setStudentEmail(null);
    setProject(null); setSavedProject(null); setAllDrafts({});
    setScreen("auth");
  };

  return (
    <>
      <style>{STYLES}</style>
      {screen === "auth" && (
        <AuthScreen
          onLogin={handleLogin}
          savedSupervisor={supervisor}
          onReturnToDashboard={() => { setRole("supervisor"); setScreen("supervisor_dashboard"); }}
          onSwitchAccount={handleSwitchAccount}
        />
      )}
      {screen === "supervisor_dashboard" && supervisor && (
        <SupervisorDashboard supervisor={supervisor} onBack={handleSupervisorSignOut} />
      )}
      {screen === "setup" && (
        <SetupScreen
          onBack={handleSignOut}
          onSubmit={handleNewProject}
        />
      )}
      {screen === "dashboard" && project && (
        <StudentDashboard
          project={project}
          allDrafts={allDrafts}
          onGoToChapter={ch => { setChapter(ch); setScreen("writing"); }}
          onGoToChapters={() => setScreen("chapters")}
          onViewSubmission={(ch, fb) => { setViewChapter(ch); setViewChapterFeedback(fb || null); }}
          onSignOut={handleSignOut}
        />
      )}
      {screen === "chapters" && project && (
        <ChaptersScreen
          project={project}
          allDrafts={allDrafts}
          onHome={() => setScreen("dashboard")}
          onBack={() => setScreen("setup")}
          onSelect={ch => { setChapter(ch); setScreen("writing"); }}
          onViewSubmission={(ch, fb) => { setViewChapter(ch); setViewChapterFeedback(fb || null); }}
        />
      )}
      {screen === "writing" && project && chapter && (
        <WritingScreen
          project={project}
          chapter={chapter}
          initialDrafts={allDrafts[chapter.num] || {}}
          onHome={() => setScreen("dashboard")}
          onBack={() => setScreen("chapters")}
          onSaveDrafts={(chNum, drafts) => setAllDrafts(p => ({ ...p, [chNum]: drafts }))}
          onComplete={handleComplete}
        />
      )}
      {viewChapter && (
        <SubmissionViewer
          project={project}
          chapter={viewChapter}
          drafts={allDrafts[viewChapter.num] || {}}
          supervisorFeedback={viewChapterFeedback}
          onClose={() => { setViewChapter(null); setViewChapterFeedback(null); }}
          onDownload={() => { buildDownload(project, viewChapter, allDrafts[viewChapter.num] || {}); }}
        />
      )}
    </>
  );
}


    // ── Firebase setup banner ────────────────────────────────────────────────
    function FirebaseBanner() {
      const [show, setShow] = useState(!window._fbConfigured);
      if (!show) return null;
      return (
        <div style={{ position:"fixed", top:0, left:0, right:0, zIndex:9999, background:"#1A2E42", borderBottom:"2px solid #FFC107", padding:"10px 18px", fontFamily:"sans-serif", fontSize:12, color:"#C4C9D0", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
          <span style={{ color:"#FFC107", fontWeight:700 }}>⚠ Local mode</span>
          <span>Accounts only on this device. Add Firebase config for cross-device login.</span>
          <a href="https://console.firebase.google.com" target="_blank" style={{ color:"#00C9A7", fontWeight:600 }}>Set up Firebase →</a>
          <button onClick={() => setShow(false)} style={{ marginLeft:"auto", background:"transparent", border:"1px solid rgba(255,255,255,0.15)", borderRadius:5, padding:"3px 10px", color:"#8892A0", cursor:"pointer", fontSize:11 }}>✕</button>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<><FirebaseBanner /><App /></>);
  </script>
</body>
</html>
